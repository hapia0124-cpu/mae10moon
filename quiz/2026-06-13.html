var quizzes=[{"id": 1208, "created_at": "2026-06-13T00:20:03.903035+00:00", "date": "2026-06-13", "category": "시사", "question": "미-이란 간 종전 합의 임박 소식 등 중동 리스크 완화 기대감이 확산될 때, 국제 금융시장에 미치는 영향으로 가장 거리가 먼 것은?", "options": ["① 국제 유가가 하락하여 에너지 비용 부담이 줄어든다.", "② 안전자산 선호 심리가 약화되어 증시가 전반적으로 상승할 수 있다.", "③ 신흥국 통화 가치가 하락하고 달러화 강세가 심화될 수 있다.", "④ 글로벌 공급망 차질 우려가 완화되어 기업 생산 활동에 긍정적이다."], "answer": "③ 신흥국 통화 가치가 하락하고 달러화 강세가 심화될 수 있다.", "explanation": "중동 리스크 완화는 안전자산인 달러화에 대한 선호를 약화시켜 달러화 약세로 이어질 가능성이 크며, 위험 선호 심리 확산으로 신흥국 통화는 강세를 보일 수 있습니다. [오답해설] ① 중동 지역 불안정은 유가 상승 요인이므로, 완화 시 유가는 하락하는 것이 일반적입니다. ② 지정학적 리스크 완화는 투자 심리를 개선하여 주식 등 위험자산에 대한 투자를 증가시킵니다. ④ 중동 지역의 안정은 원유 수송 등 물류 안정화에 기여하여 글로벌 공급망 차질 우려를 완화합니다.", "news_context": "이란 외무장관의 종전 MOU 서명 가능성 발언과 미국-이란 합의 기대감으로 국제 유가가 하락하고 뉴욕 증시가 동반 상승하는 등 중동 리스크 완화에 대한 기대감이 확산되고 있습니다.", "news_url": null}, {"id": 1211, "created_at": "2026-06-13T00:20:03.903035+00:00", "date": "2026-06-13", "category": "시사", "question": "스페이스X의 대규모 IPO 흥행 등 우주산업에 대한 투자가 활발해지는 현상이 금융시장에 주는 시사점으로 가장 적절한 것은?", "options": ["① 전통적인 산업 위주로 자본이 집중되는 현상이 심화될 것이다.", "② 고위험-고수익 특성을 가진 신성장 동력 산업에 대한 투자 관심이 증가한다.", "③ 초기 투자 비용이 낮은 산업군에 대한 투자가 확대될 것이다.", "④ 기술 혁신보다는 안정적인 수익을 추구하는 보수적 투자가 대세가 된다."], "answer": "② 고위험-고수익 특성을 가진 신성장 동력 산업에 대한 투자 관심이 증가한다.", "explanation": "스페이스X와 같은 우주산업은 막대한 초기 투자가 필요하고 기술 개발 리스크가 높지만, 성공 시 높은 수익을 기대할 수 있는 대표적인 고위험-고수익 신성장 동력 산업이며, 그 흥행은 이러한 산업에 대한 투자자들의 관심이 증가하고 있음을 보여줍니다. [오답해설] ① 우주산업은 전통 산업과 거리가 멀며, 새로운 산업으로 자본이 분산될 가능성이 큽니다. ③ 우주산업은 초기 투자 비용이 매우 높은 산업군에 속합니다. ④ 신성장 산업 투자는 기술 혁신을 바탕으로 하며, 안정성보다는 성장성을 중시하는 경향이 있습니다.", "news_context": "스페이스X의 성공적인 기업공개(IPO)는 일론 머스크의 자산을 천문학적으로 늘리는 한편, 우주산업 전반에 대한 투자자들의 기대와 관심을 증폭시키고 있습니다.", "news_url": "https://www.ajunews.com/view/20260613082634638"}, {"id": 1212, "created_at": "2026-06-13T05:08:08.974197+00:00", "date": "2026-06-13", "category": "금융용어", "question": "암호화폐의 가격 변동성을 줄이기 위해 그 가치를 미국 달러화나 금 등 특정 자산의 가치에 고정하도록 설계된 암호화폐를 무엇이라 하는가?", "options": ["① 스테이블코인", "② 알트코인", "③ 밈코인", "④ CBDC"], "answer": "① 스테이블코인", "explanation": "스테이블코인은 가치 안정화를 위해 특정 자산에 연동되도록 설계된 암호화폐입니다. [오답해설] ② 알트코인은 비트코인 외의 모든 암호화폐를 지칭하며, 일반적으로 가격 변동성이 높습니다. ③ 밈코인은 인터넷 밈(meme)에서 유래한 암호화폐로, 투기성이 강하고 가격 변동성이 매우 큽니다. ④ CBDC(중앙은행 디지털 화폐)는 중앙은행이 발행하는 법정 디지털 화폐로, 민간이 발행하는 스테이블코인과는 다릅니다.", "news_context": "“연내 도입 수요 있다” 스테이블코인 발행 앞둔 은행들이 최근 눈독들...", "news_url": "https://n.news.naver.com/mnews/article/016/0002656076?sid=101"}, {"id": 1200, "created_at": "2026-06-13T00:00:29.637241+00:00", "date": "2026-06-13", "category": "시사", "question": "스페이스X와 같은 기업이 대규모 기업 공개(IPO)를 성공적으로 추진하는 것은 기업뿐만 아니라 자본시장 전반에 다양한 영향을 미친다. IPO에 대한 설명으로 가장 적절하지 않은 것은?", "options": ["① 기업은 IPO를 통해 대규모 자금을 조달하여 사업 확장의 기회를 얻을 수 있다.", "② IPO를 통해 주식이 상장되면 기업의 인지도와 신뢰도가 높아질 수 있다.", "③ IPO는 주로 기존 주주들의 지분 매각을 위한 유일한 수단으로 활용된다.", "④ 일반 투자자들은 IPO를 통해 성장 가능성이 높은 기업의 주식을 구매할 수 있는 기회를 얻는다."], "answer": "③ IPO는 주로 기존 주주들의 지분 매각을 위한 유일한 수단으로 활용된다.", "explanation": "IPO는 기업의 자금 조달 및 성장 기회 확대와 더불어 기존 주주에게는 투자 회수 기회를 제공하지만, 유일한 수단은 아니며 기업의 자금 조달이 더 큰 목적일 수 있습니다. [오답해설] ① IPO는 자금 조달의 중요한 수단이며, 이를 통해 기업은 신규 투자 자금을 확보할 수 있습니다. ② 기업은 상장을 통해 공신력을 얻고 브랜드 가치를 높일 수 있습니다. ④ 일반 투자자들에게는 유망 기업에 투자할 수 있는 새로운 기회를 제공합니다.", "news_context": "스페이스X의 역대급 IPO 성공과 흥행 소식이 여러 기사에서 다루어지고 있습니다.", "news_url": null}, {"id": 1216, "created_at": "2026-06-13T05:08:08.974197+00:00", "date": "2026-06-13", "category": "세부지식", "question": "최근 고환율 상황에서 판매가 증가했으나 금융감독원의 자제령으로 판매가 축소된 '달러보험'에 대한 설명으로 가장 적절한 것은?", "options": ["① 보험료 납입 및 보험금 지급이 모두 원화로 이루어지며, 환율 변동 위험이 없는 상품이다.", "② 원화를 보험료로 납입하고 달러로 보험금을 지급받는 구조로, 환율 상승 시 보험금의 원화 가치가 증가하는 효과를 기대할 수 있다.", "③ 달러로만 가입 및 해지가 가능하며, 국내 거주자는 가입할 수 없는 해외 전용 상품이다.", "④ 주로 환헤지를 목적으로 하는 기업을 위한 특수 보험상품이다."], "answer": "② 원화를 보험료로 납입하고 달러로 보험금을 지급받는 구조로, 환율 상승 시 보험금의 원화 가치가 증가하는 효과를 기대할 수 있다.", "explanation": "달러보험은 보험료 납입과 보험금 지급 기준이 달러로 되어 있어, 환율 변동에 따라 원화 가치가 변동될 수 있는 상품입니다. [오답해설] ① 달러보험은 환율 변동에 직접적으로 영향을 받는 상품입니다. ③ 국내 거주자도 가입할 수 있으며, 환전 과정을 통해 원화로 납입 및 지급이 가능합니다. ④ 개인 투자자도 가입할 수 있는 상품입니다.", "news_context": "고환율에 인기 끈 달러보험… 금감원 자제령에 판매 축소", "news_url": "https://www.mk.co.kr/news/economy/12072956"}, {"id": 1199, "created_at": "2026-06-13T00:00:29.637241+00:00", "date": "2026-06-13", "category": "시사", "question": "정부의 정책적 지원 기조에 따라 은행들이 중소기업 등 특정 부문에 대한 대출을 확대하는 경우가 있다. 이러한 과정에서 은행의 건전성에 경고등이 켜질 수 있는 주요 이유로 가장 적절한 것은?", "options": ["① 정책 대출은 일반적으로 담보가 부족하거나 신용도가 낮은 차주에게 나가기 쉬워 부실화 위험이 높다.", "② 정책 대출은 정부가 이자 전액을 보전해주므로 은행의 수익성이 과도하게 증가하여 문제가 될 수 있다.", "③ 정책 대출은 대출 심사 기준이 매우 까다로워 대출 실행 자체가 어렵기 때문이다.", "④ 정책 대출의 경우 차주가 대출금을 조기에 상환하는 경우가 많아 은행의 자금 운용 계획에 차질이 생긴다."], "answer": "① 정책 대출은 일반적으로 담보가 부족하거나 신용도가 낮은 차주에게 나가기 쉬워 부실화 위험이 높다.", "explanation": "정책 대출은 대출의 목적상 담보나 신용도보다 정책적 필요성이 우선시되어 부실 위험이 일반 대출보다 높을 수 있습니다. [오답해설] ② 정부의 이자 보전은 제한적이며, 정책 대출은 주로 저신용 기업에 대한 지원이 많아 부실 위험이 존재합니다. ③ 정책 대출은 일반 대출보다 심사 기준이 완화되는 경우가 많습니다. ④ 정책 대출의 조기 상환보다는 만기 연장이나 부실 가능성이 더 큰 위험 요소입니다.", "news_context": "정책에 따라 기업 대출을 늘린 은행들의 건전성에 경고등이 켜지고 있다는 내용입니다.", "news_url": "https://n.news.naver.com/mnews/article/243/0000099076?sid=101"}, {"id": 1197, "created_at": "2026-06-13T00:00:29.637241+00:00", "date": "2026-06-13", "category": "시사", "question": "한국은행이 물가 안정과 가계부채 관리를 위해 금리 인상 가능성을 시사하고 통화 긴축 기조를 강화할 움직임을 보이고 있다. 이러한 중앙은행의 통화 긴축 정책이 국내 경제에 미칠 영향으로 가장 거리가 먼 것은?", "options": ["① 은행의 예대마진 개선으로 수익성이 증가할 수 있다.", "② 기업의 자금 조달 비용이 증가하여 투자 심리가 위축될 수 있다.", "③ 가계의 대출 이자 부담이 가중되어 소비 여력이 감소할 수 있다.", "④ 채권 가격 상승으로 투자자들의 채권 투자 매력이 증대될 수 있다."], "answer": "④ 채권 가격 상승으로 투자자들의 채권 투자 매력이 증대될 수 있다.", "explanation": "금리 인상 시 채권 금리가 상승하여 채권 가격은 하락하는 경향이 있습니다. [오답해설] ① 금리 인상은 예금금리보다 대출금리가 더 빨리 오르는 경향이 있어 은행의 예대마진 개선에 기여할 수 있습니다. ② 금리가 오르면 기업이 돈을 빌리는 비용이 늘어나 투자 활동이 위축될 수 있습니다. ③ 금리 인상은 변동금리 대출을 가진 가계의 이자 부담을 늘려 소비를 감소시킬 수 있습니다.", "news_context": "한은 총재가 집값 상승 기대와 물가 안정화를 위해 금리 인상을 늦지 않게 해야 한다고 언급하며 통화 긴축 시계가 빨라지고 있습니다.", "news_url": "https://www.mk.co.kr/news/economy/12072760"}, {"id": 1196, "created_at": "2026-06-13T00:00:29.637241+00:00", "date": "2026-06-13", "category": "세부지식", "question": "최근 고환율 상황에서 인기를 끌었던 달러보험에 대해 금융감독원이 판매 자제를 권고하며 보험사들이 상품 판매를 축소하는 움직임을 보이고 있다. 금감원이 달러보험 판매 자제를 권고한 주요 이유로 가장 적절한 것은?", "options": ["① 환율 변동성 확대 시 소비자에게 예상치 못한 손실 위험이 커질 수 있기 때문에.", "② 달러보험이 국내 외환보유고 감소에 직접적인 영향을 미치기 때문에.", "③ 달러보험 판매가 과도한 사교육비 지출을 조장할 수 있기 때문에.", "④ 보험사들이 달러보험 판매를 통해 부당한 이득을 취하고 있다는 정황이 포착되었기 때문에."], "answer": "① 환율 변동성 확대 시 소비자에게 예상치 못한 손실 위험이 커질 수 있기 때문에.", "explanation": "달러보험은 환율 변동에 따라 원화 환산 시 손실을 볼 수 있는 위험이 있어 금융감독원이 소비자 보호를 위해 판매 자제를 권고하고 있습니다. [오답해설] ② 달러보험의 판매 자체가 외환보유고에 직접적인 감소 영향을 미치는 주된 요인은 아닙니다. ③ 달러보험 판매와 사교육비 지출 조장은 직접적인 관련이 없습니다. ④ 현재까지 금감원이 보험사의 부당 이득 취득을 주요 이유로 발표하지는 않았습니다.", "news_context": "고환율 속 달러보험 판매 증가와 금융감독원의 자제령으로 인한 판매 축소 소식입니다.", "news_url": "https://www.mk.co.kr/news/economy/12072956"}, {"id": 1213, "created_at": "2026-06-13T05:08:08.974197+00:00", "date": "2026-06-13", "category": "금융용어", "question": "대규모 클라우드 컴퓨팅 서비스를 제공하기 위해 막대한 규모의 인프라(서버, 스토리지, 네트워크 등)를 구축하고 운영하는 기업을 지칭하는 용어는?", "options": ["① 하이퍼 스케일러", "② 핀테크 유니콘", "③ 시스템 인테그레이터", "④ 에지 컴퓨팅 프로바이더"], "answer": "① 하이퍼 스케일러", "explanation": "하이퍼 스케일러는 대규모 클라우드 서비스를 제공하기 위한 인프라를 구축하고 운영하는 기업을 의미합니다. [오답해설] ② 핀테크 유니콘은 금융 기술 분야에서 기업 가치 10억 달러 이상을 달성한 비상장 스타트업을 지칭합니다. ③ 시스템 인테그레이터는 다양한 하드웨어와 소프트웨어를 통합하여 하나의 시스템을 구축하는 역할을 하는 기업입니다. ④ 에지 컴퓨팅 프로바이더는 데이터 소스와 가까운 곳에서 데이터를 처리하는 에지 컴퓨팅 환경을 제공하는 기업입니다.", "news_context": "[KIW2026 다시보기 영상] 맨딥 싱 \"하이퍼 스케일러 투자 줄어도 메모리는 간다\"", "news_url": null}, {"id": 1214, "created_at": "2026-06-13T05:08:08.974197+00:00", "date": "2026-06-13", "category": "세부지식", "question": "최근 금융당국의 가계대출 관리 강화 기조에 따라 시중은행들이 시행하고 있는 신용대출 규제 내용으로, 고소득 직장인의 신용대출 한도 변화를 가장 잘 설명한 것은?", "options": ["① 신용대출 한도가 5천만 원으로 일괄 상향 조정되었다.", "② 신용대출 한도가 1억 원으로, 마이너스 통장 한도가 5천만 원으로 일괄 제한되었다.", "③ 신용대출 한도는 소득에 따라 무제한으로 허용된다.", "④ 신용대출 금리가 인하되어 한도는 유지하되 대출 부담을 줄였다."], "answer": "② 신용대출 한도가 1억 원으로, 마이너스 통장 한도가 5천만 원으로 일괄 제한되었다.", "explanation": "최근 금융당국의 가계대출 관리 강화 기조에 따라 시중은행들은 고소득 직장인의 신용대출 한도를 1억 원, 마이너스 통장 한도를 5천만 원으로 제한하고 있습니다. [오답해설] ① 상향 조정이 아닌 제한입니다. ③ 소득과 상관없이 무제한으로 허용되지 않으며, 오히려 한도가 제한되었습니다. ④ 신용대출 금리는 인하되지 않고 오히려 인상되거나 유지되는 추세입니다.", "news_context": "억대 연봉 벌어도 마통 한도 5000만원까지…신용대출 확 조인다", "news_url": "https://www.mk.co.kr/news/economy/12073109"}, {"id": 1215, "created_at": "2026-06-13T05:08:08.974197+00:00", "date": "2026-06-13", "category": "세부지식", "question": "스페이스X와 같은 기업의 신규 주식 발행 시, 일반 투자자가 주식을 배정받기 위해 청약하는 '공모주 청약'과 관련된 설명으로 옳지 않은 것은?", "options": ["① 청약 경쟁률이 높을수록 투자자가 배정받을 수 있는 주식 수가 줄어들 가능성이 크다.", "② 일반적으로 균등배정 방식은 청약 증거금 규모와 상관없이 모든 청약자에게 최소 수량을 배정하는 방식이다.", "③ 비례배정 방식은 청약 증거금을 많이 납입할수록 더 많은 주식을 배정받을 확률이 높아진다.", "④ 공모주 청약 시 납입한 청약 증거금은 배정받은 주식 구매에 사용되며, 남은 금액은 전액 손실 처리되어 환불되지 않는다."], "answer": "④ 공모주 청약 시 납입한 청약 증거금은 배정받은 주식 구매에 사용되며, 남은 금액은 전액 손실 처리되어 환불되지 않는다.", "explanation": "공모주 청약 시 납입한 청약 증거금 중 배정받은 주식 구매에 사용되지 않은 금액(미배정분 및 초과분)은 청약자에게 환불됩니다. [오답해설] ① 청약 경쟁률이 높으면 한정된 공모주를 많은 사람이 신청하므로 개인당 배정받는 주식 수가 줄어듭니다. ② 균등배정은 최소 수량 이상을 모든 청약자에게 균등하게 배정하는 방식입니다. ③ 비례배정은 청약 증거금에 비례하여 주식을 배정하는 방식입니다.", "news_context": "미래에셋, '스페이스X 공모주' 한주도 못 받았다…\"전액 환불\"", "news_url": null}, {"id": 1206, "created_at": "2026-06-13T00:20:03.903035+00:00", "date": "2026-06-13", "category": "세부지식", "question": "지방자치단체가 금고(자금)를 관리할 금융기관을 선정하는 '시금고 지정' 제도에 대한 설명으로 가장 적절한 것은?", "options": ["① 시금고는 지방채 발행을 통해 지방자치단체의 재정을 직접 조달하는 역할을 한다.", "② 시금고는 지방자치단체의 예산 집행, 세입·세출 관리, 자금 운용 등 금융업무를 수행한다.", "③ 시금고 지정은 공공성과 수익성보다는 오직 금융기관의 대출 금리 경쟁력을 최우선으로 고려한다.", "④ 시금고 지정 시 심사위원은 전원 지방자치단체 공무원으로만 구성되어야 한다."], "answer": "② 시금고는 지방자치단체의 예산 집행, 세입·세출 관리, 자금 운용 등 금융업무를 수행한다.", "explanation": "시금고는 지방자치단체의 금고를 관리하며 예산 집행, 세입·세출 관리, 자금 운용 등의 금융업무를 담당합니다. [오답해설] ① 지방채 발행은 지방자치단체가 직접 하는 것이며, 시금고는 발행된 지방채의 관리 업무를 할 수 있습니다. ③ 시금고 지정 시에는 공공성, 안정성, 대출 금리 경쟁력, 기여도 등 다양한 요소가 종합적으로 고려됩니다. ④ 부산시 사례처럼 심사위원의 공정성 강화를 위해 민간 전문가 참여를 확대하는 추세입니다.", "news_context": "부산시가 시금고 지정의 공정성을 강화하기 위해 심사위원의 과반수를 민간 전문가로 구성하는 방안을 추진하고 있습니다.", "news_url": "https://www.yna.co.kr/view/AKR20260612116400051"}, {"id": 1195, "created_at": "2026-06-13T00:00:29.637241+00:00", "date": "2026-06-13", "category": "세부지식", "question": "2026년부터 시행될 예정이었던 가상자산(암호화폐) 소득에 대한 세금 부과와 관련하여, 현재 특정 상황에서는 올해 6월에 세금 신고를 해야 하는 경우가 발생할 수 있다. 다음 설명 중 옳은 것은?", "options": ["① 국내 거주자의 가상자산 매매차익은 내년부터 전면 과세되므로, 올해 6월에 신고할 필요는 없다.", "② 해외 가상자산 거래소를 통해 발생한 소득은 거주 여부와 관계없이 국내에서 신고 및 납부해야 한다.", "③ 가상자산 관련 해외금융계좌의 잔액 합계가 특정 금액을 초과하는 경우, 매년 6월에 관할 세무서에 신고해야 한다.", "④ 가상자산 소득세는 양도소득세와 동일하게 분리과세되며, 기본 공제 한도는 연 250만원이다."], "answer": "③ 가상자산 관련 해외금융계좌의 잔액 합계가 특정 금액을 초과하는 경우, 매년 6월에 관할 세무서에 신고해야 한다.", "explanation": "거주자의 해외 가상자산 해외금융계좌의 잔액 합계가 5억 원을 초과하는 경우 매년 6월에 신고해야 합니다. [오답해설] ① 가상자산 소득 과세는 2026년부터 전면 시행되지만, 해외금융계좌 신고 의무는 별개로 적용됩니다. ② 해외 가상자산 거래소 소득은 거주자에 한해 국내에서 신고 및 납부 의무가 발생합니다. ④ 가상자산 소득세는 기타소득으로 분류되며, 양도소득세와는 다르며 기본 공제 한도는 연 250만원입니다.", "news_context": "코인 세금 신고 기한을 놓치면 과태료가 부과될 수 있다는 내용으로, 특히 해외 거래소 관련 내용이 강조됩니다.", "news_url": "https://www.mk.co.kr/news/economy/12073080"}, {"id": 1193, "created_at": "2026-06-13T00:00:29.637241+00:00", "date": "2026-06-13", "category": "금융용어", "question": "특정 통화의 가치가 다른 주요 통화에 비해 크게 상승하여 전 세계 금융시장에서 막대한 영향력을 행사하는 현상을 일컫는 용어로, 주로 미국 달러화의 강세를 지칭할 때 사용된다. 이 용어는 무엇인가?", "options": ["① 킹달러", "② 슈퍼 위크", "③ 빅배스", "④ 플라자 합의"], "answer": "① 킹달러", "explanation": "킹달러는 미국 달러화의 강세로 인해 전 세계 금융시장에 큰 영향력을 행사하는 현상을 의미합니다. [오답해설] ② 슈퍼 위크는 금융 시장에서 중요한 경제 지표 발표가 집중되는 한 주를 의미합니다. ③ 빅배스는 기업이 부실 요소를 한 회계연도에 모두 반영하여 재무 상태를 개선하는 행위를 말합니다. ④ 플라자 합의는 1985년 미국, 일본 등 주요 5개국이 달러화 강세를 시정하기 위해 합의한 외환 시장 개입 조치입니다.", "news_context": "원·달러 환율 향방을 가를 변수로서 킹달러 현상에 대한 언급이 있습니다.", "news_url": "https://n.news.naver.com/mnews/article/018/0006305016?sid=101"}, {"id": 1192, "created_at": "2026-06-13T00:00:29.637241+00:00", "date": "2026-06-13", "category": "금융용어", "question": "금융기관이 단순한 자금 공급을 넘어 기술 혁신, 친환경 투자 등 실물경제의 생산성 향상에 기여하는 분야에 자금을 지원하고 육성하는 활동을 의미한다. 이러한 금융 활동을 무엇이라고 하는가?", "options": ["① 생산적 금융", "② 포용적 금융", "③ 사회적 금융", "④ 녹색 금융"], "answer": "① 생산적 금융", "explanation": "생산적 금융은 금융이 실물경제의 생산성 향상에 기여하는 분야에 자금을 지원하는 활동을 의미합니다. [오답해설] ② 포용적 금융은 금융 소외 계층에게 금융 서비스 접근성을 높이는 활동을 의미합니다. ③ 사회적 금융은 사회적 가치 창출을 목적으로 하는 기업이나 조직에 자금을 지원하는 것을 말합니다. ④ 녹색 금융은 환경 보호 및 지속 가능한 발전을 위한 친환경 기술 및 사업에 자금을 지원하는 활동을 의미합니다.", "news_context": "하나금융이 생산적 금융에 힘을 싣는다는 내용에서 관련 개념을 유추할 수 있습니다.", "news_url": "https://www.mk.co.kr/news/economy/12072958"}, {"id": 1217, "created_at": "2026-06-13T05:08:08.974197+00:00", "date": "2026-06-13", "category": "시사", "question": "한국은행 총재가 \"늦지 않게 금리 인상\"을 언급한 것과 같이, 중앙은행이 기준금리를 인상할 때 일반적으로 기대하는 경제적 효과를 모두 고른 것은?\n(가) 물가 안정\n(나) 시중 유동성 감소\n(다) 경기 활성화\n(라) 가계 부채 증가 억제", "options": ["① (가), (나)", "② (가), (다)", "③ (나), (라)", "④ (가), (나), (라)"], "answer": "④ (가), (나), (라)", "explanation": "기준금리 인상은 대출 이자 부담을 늘려 시중 유동성을 줄이고(나), 이는 물가 상승 압력을 완화하여 물가를 안정시키며(가), 가계 및 기업의 부채 증가를 억제하는 효과(라)를 가져옵니다. [오답해설] (다) 경기 활성화는 금리 인상으로 인한 투자 및 소비 위축으로 달성하기 어려운 효과입니다. 오히려 경기 둔화를 야기할 수 있습니다.", "news_context": "한은 총재 “집값 상승 기대 높아졌다…늦지 않게 금리 인상”", "news_url": "https://www.mk.co.kr/news/economy/12072480"}, {"id": 1218, "created_at": "2026-06-13T05:08:08.974197+00:00", "date": "2026-06-13", "category": "시사", "question": "최근 지속되는 고환율이 국내 경제에 미치는 영향에 대한 설명으로 옳지 않은 것은?", "options": ["① 수출 기업의 가격 경쟁력이 개선되어 수출이 증가할 수 있다.", "② 수입 물가가 상승하여 국내 물가 상승 압력이 커질 수 있다.", "③ 원자재 수입 의존도가 높은 기업의 원가 부담이 가중될 수 있다.", "④ 해외로부터 유입되는 외국인 투자 자금이 증가하고, 국내 자본의 해외 유출이 감소한다."], "answer": "④ 해외로부터 유입되는 외국인 투자 자금이 증가하고, 국내 자본의 해외 유출이 감소한다.", "explanation": "고환율은 외국인 투자자 입장에서 환차손 우려를 키워 국내 투자를 위축시킬 수 있으며, 국내 자본의 해외 유출은 해외 자산 구매 비용이 늘어나기 때문에 오히려 감소하는 경향이 있습니다. [오답해설] ① 고환율은 해외 시장에서 국내 상품의 가격 경쟁력을 높여 수출에 긍정적일 수 있습니다. ② 수입품의 원화 가격이 상승하므로 수입 물가가 상승하여 국내 물가 상승 압력이 커집니다. ③ 원자재를 해외에서 수입하는 기업은 원화로 더 많은 대가를 지불해야 하므로 원가 부담이 커집니다.", "news_context": "靑 \"대미투자 판단할 환율 레벨 있는 것 아냐…좀 안정화 돼야\"", "news_url": null}, {"id": 1219, "created_at": "2026-06-13T05:08:08.974197+00:00", "date": "2026-06-13", "category": "시사", "question": "가상자산 투자 소득에 대한 세금 신고와 관련하여 뉴스 기사에 언급된 내용으로 옳은 것은?", "options": ["① 가상자산 소득세는 현재 연말정산 시 자동 신고되므로 별도 신고가 필요 없다.", "② 2026년 1월 1일 이후 발생한 가상자산 소득에 대해서만 세금 납부 의무가 발생한다.", "③ 가상자산 소득세 신고는 내년부터 시작되므로, 올해 6월에는 신고 의무가 없다.", "④ 특정 기간에 발생한 가상자산 소득에 대한 세금 신고를 놓칠 경우 과태료가 부과될 수 있다."], "answer": "④ 특정 기간에 발생한 가상자산 소득에 대한 세금 신고를 놓칠 경우 과태료가 부과될 수 있다.", "explanation": "뉴스 기사는 '6월 신고 놓치면 수천만원 과태료'라고 명시하며 특정 시점의 신고 의무를 강조하고 있습니다. 이는 가상자산 관련 증여세 등 기존 세법 적용 소득에 대한 신고를 의미할 수 있습니다. [오답해설] ① 가상자산 소득세는 일반적으로 자동 신고되지 않으며, 별도 신고가 필요할 수 있습니다. ② 세금 납부 의무는 법규에 따라 다르며, 2026년 이전에 발생한 소득에 대한 신고 의무가 있을 수 있습니다. ③ 기사 내용에 따르면 올해 6월에도 특정 신고 의무가 있을 수 있음을 시사합니다.", "news_context": "코인세금 내년부터 아닌가요? … 6월 신고 놓치면 수천만원 과태료 [리치 되는 절세법]", "news_url": "https://www.mk.co.kr/news/economy/12073080"}, {"id": 1220, "created_at": "2026-06-13T05:08:08.974197+00:00", "date": "2026-06-13", "category": "시사", "question": "최근 금융당국과 시중은행이 가계대출을 적극적으로 규제하고 한도를 조이는 주요 목적으로 가장 적절한 것은?", "options": ["① 주택 시장 활성화를 위해 자금의 부동산 유입을 유도하기 위함이다.", "② 은행의 수익성 증대를 위해 대출 금리를 인상하고 신규 대출을 억제하기 위함이다.", "③ 가계 부채 증가 속도를 조절하고 금융 시스템의 잠재적 위험을 관리하기 위함이다.", "④ 개인의 소비 활동을 위축시켜 저축률을 높이고자 하는 정책의 일환이다."], "answer": "③ 가계 부채 증가 속도를 조절하고 금융 시스템의 잠재적 위험을 관리하기 위함이다.", "explanation": "가계대출 규제 강화는 가계 부채의 건전성을 확보하고, 과도한 부채가 금융 시스템 전반에 미칠 수 있는 위험을 사전에 방지하기 위한 목적이 가장 큽니다. [오답해설] ① 가계대출 규제는 부동산 시장 과열을 막고 안정화를 도모하는 측면이 강합니다. ② 은행의 수익성 증대는 규제의 직접적인 목적이 아니며, 규제로 인해 대출이 줄어들면 단기적으로 수익성이 악화될 수도 있습니다. ④ 개인의 소비 위축은 규제의 부수적 효과일 수 있으나, 주된 목적은 아닙니다.", "news_context": "‘빚투’에 신용대출 1.6조 급증…시중은행 가계대출, 이달 들어 2.8조 ‘쑥’", "news_url": "https://www.mk.co.kr/news/economy/12073287"}, {"id": 1221, "created_at": "2026-06-13T05:08:08.974197+00:00", "date": "2026-06-13", "category": "시사", "question": "지방자치단체 '시금고' 지정과 관련하여, 지자체가 시금고를 선정할 때 주로 고려하는 평가 요소로 가장 거리가 먼 것은?", "options": ["① 지역사회 기여도 및 금융 인프라 구축 노력", "② 재정 안정성 및 자금 운용의 투명성", "③ 금고 운영 능력 및 전산 시스템 안정성", "④ 은행의 총자산 규모 및 주식 시장에서의 시가총액"], "answer": "④ 은행의 총자산 규모 및 주식 시장에서의 시가총액", "explanation": "시금고 선정은 해당 은행이 지자체의 자금을 얼마나 안정적이고 효율적으로 관리할 수 있는지, 그리고 지역사회에 얼마나 기여하는지에 중점을 둡니다. 은행의 총자산 규모나 시가총액은 간접적인 평가 요소일 수 있으나, 직접적인 선정 기준으로 보기는 어렵습니다. [오답해설] ① 지역사회 기여 및 인프라 구축은 시금고 선정 시 중요한 평가 요소입니다. ② 지자체 자금의 안정적 운용을 위해 재정 안정성과 투명성은 필수적인 평가 요소입니다. ③ 금고 운영 능력과 전산 시스템의 안정성은 효율적인 자금 관리를 위해 매우 중요합니다.", "news_context": "부산시, 시금고 지정 공정성 강화…심사위원 과반을 민간에", "news_url": "https://www.yna.co.kr/view/AKR20260612116400051"}];
var current=0;var score=0;var answered=false;var audioCtx=null;

function render(){
  if(current>=quizzes.length){showResult();return;}
  var q=quizzes[current];
  document.getElementById('progressBar').style.width=(current/quizzes.length*100)+'%';
  document.getElementById('progressLabel').textContent=current+'/'+quizzes.length;
  var optHtml='';for(var i=0;i<q.options.length;i++)optHtml+='<button class="option" onclick="selectOpt(this,'+i+')">'+q.options[i]+'</button>';
  var expParts=(q.explanation||'').split('[오답해설]');
  var expHtml=expParts.length>1?expParts[0].trim()+'<br><br><strong>[오답해설]</strong><br>'+expParts.slice(1).map(function(p){return p.trim();}).join('<br>'):q.explanation||'';
  var newsHtml='';if(q.news_context){newsHtml='<div class="news-ctx">📰 '+q.news_context;if(q.news_url)newsHtml+=' <a href="'+q.news_url+'" target="_blank" class="news-link">[원문]</a>';newsHtml+='</div>';}
  document.getElementById('quizArea').innerHTML='<div class="quiz-card"><span class="category-tag '+getTagClass(q.category)+'">'+q.category+'</span><div class="question-text">'+q.question+'</div><div class="options">'+optHtml+'</div><div class="explanation" id="exp"><div class="exp-label">📖 EXPLANATION</div>'+expHtml+newsHtml+'</div></div><div class="nav-buttons"><button class="btn" id="nextBtn" onclick="nextQ()">'+(current===quizzes.length-1?'RESULT ▶':'NEXT ▶')+'</button></div>';
  answered=false;
}
function selectOpt(el,idx){
  if(answered)return;answered=true;
  var q=quizzes[current];var opts=document.querySelectorAll('.option');
  var getNum=function(s){var m=s.match(/[①②③④]/);return m?m[0]:''};
  var isCorrect=getNum(el.textContent)&&getNum(q.answer)&&getNum(el.textContent)===getNum(q.answer);
  for(var i=0;i<opts.length;i++){opts[i].disabled=true;if(getNum(opts[i].textContent)===getNum(q.answer))opts[i].classList.add('correct');else if(opts[i]===el&&!isCorrect)opts[i].classList.add('wrong');}
  if(isCorrect)score++;
  var rect=el.getBoundingClientRect();spawnCoins(rect.left+rect.width/2,rect.top+rect.height/2,isCorrect);showScorePopup(isCorrect);playBeep(isCorrect);
  document.getElementById('exp').classList.add('show');document.getElementById('nextBtn').style.display='block';
}
function nextQ(){current++;render();}
function showResult(){document.getElementById('quizArea').style.display='none';document.getElementById('progressBar').style.width='100%';document.getElementById('progressLabel').textContent=quizzes.length+'/'+quizzes.length;document.getElementById('resultCard').classList.add('show');document.getElementById('resultScore').textContent=score;}
function spawnCoins(x,y,correct){if(!correct)return;var s=document.getElementById('stars');for(var i=0;i<5;i++){var c=document.createElement('div');c.className='coin-item';c.style.left=(x-12+(Math.random()-0.5)*60)+'px';c.style.top=(y-12)+'px';c.style.animationDelay=(i*0.06)+'s';s.appendChild(c);setTimeout(function(cc){s.removeChild(cc);},800,c);}}
function showScorePopup(correct){var p=document.createElement('div');p.className='score-popup';p.style.left='50%';p.style.top='40%';p.style.color=correct?'var(--yellow)':'var(--red)';p.textContent=correct?'+1 !':'MISS!';document.body.appendChild(p);setTimeout(function(){document.body.removeChild(p);},800);}
function playBeep(correct){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();var o=audioCtx.createOscillator();var g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='square';if(correct){o.frequency.setValueAtTime(523,audioCtx.currentTime);o.frequency.setValueAtTime(659,audioCtx.currentTime+0.1);o.frequency.setValueAtTime(784,audioCtx.currentTime+0.2);}else{o.frequency.setValueAtTime(200,audioCtx.currentTime);o.frequency.setValueAtTime(150,audioCtx.currentTime+0.15);}g.gain.setValueAtTime(0.15,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+0.4);}catch(e){}}
document.addEventListener('click',function(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();},{once:true});
render();
</script>
