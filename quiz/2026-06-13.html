<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026-06-13 금융 퀴즈 10문제 - 매십문</title>
<meta name="description" content="2026-06-13 매십문 금융 퀴즈 10문제. 매일 업데이트되는 금융/경제 퀴즈로 금융 자격증을 준비하세요.">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#5bc8f5;--sky-dark:#3aa8d8;--pink:#ff6eb4;--pink-dark:#d94f96;
  --yellow:#ffd700;--yellow-dark:#e6a800;--cream:#fff8e7;--navy:#1a1a6e;
  --purple:#8b5cf6;--green:#22c55e;--green-dark:#16a34a;--red:#ef4444;--white:#ffffff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--sky);font-family:'Press Start 2P',monospace;min-height:100vh;overflow-x:hidden;padding-bottom:2rem;}
.wrap{max-width:640px;margin:0 auto;padding:1rem;}

/* 배경 구름 */
.bg{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;}
.cloud{position:absolute;background:white;}
.cloud::before,.cloud::after{content:'';position:absolute;background:white;}
.c1{width:48px;height:16px;top:12%;left:5%;animation:cloudMove 18s linear infinite;}
.c1::before{width:24px;height:16px;top:-12px;left:8px;}
.c1::after{width:16px;height:12px;top:-8px;left:24px;}
.c2{width:96px;height:24px;top:8%;left:55%;animation:cloudMove 26s linear infinite 4s;}
.c2::before{width:48px;height:24px;top:-18px;left:16px;}
.c2::after{width:32px;height:16px;top:-10px;left:52px;}
.c3{width:140px;height:32px;top:18%;left:20%;animation:cloudMove 35s linear infinite 10s;}
.c3::before{width:72px;height:32px;top:-24px;left:24px;}
.c3::after{width:48px;height:20px;top:-14px;left:72px;}
@keyframes cloudMove{0%{transform:translateX(-200px)}100%{transform:translateX(110vw)}}

.content{position:relative;z-index:1;}

/* 타이틀 */
.title-card{
  background:var(--cream);border:6px solid var(--navy);
  box-shadow:8px 8px 0 var(--navy);padding:1.5rem;
  margin-bottom:1.5rem;text-align:center;position:relative;
}
.title-card::before{
  content:'';position:absolute;top:-6px;left:-6px;right:-6px;bottom:-6px;
  border:3px solid var(--pink);pointer-events:none;
}
.title-main{
  font-family:'Black Han Sans',sans-serif;
  font-size:clamp(3rem,12vw,5rem);
  color:#5bc8f5;-webkit-text-stroke:4px var(--navy);
  text-shadow:6px 6px 0 var(--navy);line-height:1.2;
  margin-bottom:0.5rem;letter-spacing:4px;
}
.title-sub{font-size:0.45rem;color:var(--purple);letter-spacing:1px;}
.date-badge{
  display:inline-block;margin-top:0.8rem;
  background:var(--navy);color:var(--yellow);
  border:3px solid var(--yellow);padding:4px 12px;font-size:0.5rem;
}

/* 진행바 */
.progress-wrap{
  background:var(--navy);border:4px solid #000;
  height:24px;margin-bottom:1.5rem;position:relative;box-shadow:4px 4px 0 #000;
}
.progress-bar{height:100%;background:var(--yellow);transition:width 0.3s steps(8);}
.progress-label{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  font-size:0.5rem;color:var(--navy);
}

/* 퀴즈 카드 */
.quiz-card{
  background:var(--cream);border:4px solid var(--navy);
  box-shadow:8px 8px 0 var(--navy);padding:1.5rem;
  margin-bottom:1.5rem;animation:popIn 0.2s steps(4) forwards;
}
@keyframes popIn{0%{transform:scale(0.95);opacity:0}100%{transform:scale(1);opacity:1}}

.category-tag{
  display:inline-block;padding:0.4rem 0.8rem;
  font-size:0.6rem;margin-bottom:1rem;border:3px solid;
}
.tag-금융용어{background:var(--yellow);color:var(--navy);border-color:var(--yellow-dark);}
.tag-시사{background:var(--green);color:white;border-color:var(--green-dark);}
.tag-세부지식{background:var(--purple);color:white;border-color:#6d28d9;}
.tag-default{background:var(--pink);color:white;border-color:var(--pink-dark);}

.question-text{
  font-family:'Noto Sans KR',sans-serif;font-size:0.95rem;
  line-height:1.8;color:var(--navy);margin-bottom:1.5rem;font-weight:700;
}

/* 보기 */
.options{display:flex;flex-direction:column;gap:0.8rem;}
.option{
  background:var(--white);border:4px solid var(--navy);
  box-shadow:4px 4px 0 var(--navy);padding:0.8rem 1rem;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  font-size:0.85rem;font-weight:700;color:var(--navy);
  text-align:left;width:100%;
  transition:transform 0.1s steps(2),box-shadow 0.1s steps(2);
  display:flex;align-items:center;line-height:1.5;
}
.option:hover:not(:disabled){transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--navy);background:var(--yellow);}
.option:active:not(:disabled){transform:translate(4px,4px);box-shadow:0 0 0 var(--navy);}
.option.correct{background:var(--green)!important;color:white!important;border-color:var(--green-dark)!important;box-shadow:4px 4px 0 var(--green-dark)!important;animation:correctFlash 0.3s steps(2) 2;}
.option.wrong{background:var(--red)!important;color:white!important;border-color:#b91c1c!important;box-shadow:4px 4px 0 #b91c1c!important;animation:wrongShake 0.3s steps(3);}
.option:disabled{cursor:default;}
@keyframes correctFlash{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes wrongShake{0%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}100%{transform:translateX(0)}}

/* 해설 */
.explanation{
  display:none;background:var(--navy);color:var(--cream);
  border:4px solid #000;padding:1.2rem;margin-top:1rem;
  font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;line-height:1.8;
}
.explanation.show{display:block;}
.exp-label{font-family:'Press Start 2P',monospace;font-size:0.5rem;color:var(--yellow);margin-bottom:0.8rem;}
.news-ctx{
  margin-top:0.8rem;padding:0.6rem;
  background:rgba(255,255,255,0.1);border-left:4px solid var(--yellow);
  font-size:0.78rem;color:var(--cream);
}
.news-link{color:var(--yellow);text-decoration:underline;}

/* 버튼 */
.nav-buttons{display:flex;gap:0.8rem;margin-top:0.5rem;}
.btn{
  flex:1;background:var(--pink);color:white;
  border:4px solid var(--navy);box-shadow:4px 4px 0 var(--navy);
  padding:0.8rem;font-family:'Press Start 2P',monospace;font-size:0.6rem;
  cursor:pointer;display:none;
}
.btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--navy);}
.btn-next{background:var(--pink);}

/* 결과 */
.result-card{
  background:var(--cream);border:6px solid var(--navy);
  box-shadow:8px 8px 0 var(--navy);padding:2rem;
  text-align:center;display:none;animation:popIn 0.3s steps(4);
}
.result-card.show{display:block;}
.result-title{
  font-family:'Noto Sans KR',sans-serif;font-size:1.2rem;
  font-weight:900;color:var(--navy);text-shadow:2px 2px 0 var(--pink);
  margin-bottom:1rem;line-height:2;
}
.result-score{
  font-size:3rem;color:var(--yellow);
  text-shadow:4px 4px 0 var(--yellow-dark),8px 8px 0 #000;
  margin-bottom:0.5rem;display:block;
}
.result-total{font-size:0.5rem;color:var(--navy);margin-bottom:1.5rem;}
.coin-row{display:flex;justify-content:center;gap:0.3rem;margin-bottom:1.5rem;}
.coin{width:24px;height:24px;background:var(--yellow);border:3px solid var(--yellow-dark);display:flex;align-items:center;justify-content:center;font-size:0.6rem;}
.coin.empty{background:#ddd;border-color:#aaa;}
.btn-main{
  background:var(--navy);color:var(--yellow);
  border:4px solid var(--yellow);box-shadow:4px 4px 0 #000;
  padding:1rem 2rem;font-family:'Press Start 2P',monospace;
  font-size:0.65rem;cursor:pointer;text-decoration:none;
  display:inline-block;margin-top:1rem;
}
.btn-main:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #000;}

/* 파티클 */
.stars{position:fixed;pointer-events:none;z-index:999;}
.coin-item{
  position:absolute;width:24px;height:24px;
  background:var(--yellow);border:3px solid var(--yellow-dark);
  display:flex;align-items:center;justify-content:center;
  font-size:0.5rem;color:var(--navy);
  animation:coinUp 0.7s steps(8) forwards;
  box-shadow:2px 2px 0 #000;
}
.coin-item::before{content:'₩';font-size:0.55rem;font-weight:900;}
@keyframes coinUp{
  0%{opacity:1;transform:translateY(0) scaleX(1);}
  25%{transform:translateY(-30px) scaleX(0.3);}
  50%{transform:translateY(-60px) scaleX(1);}
  75%{transform:translateY(-80px) scaleX(0.3);}
  100%{opacity:0;transform:translateY(-100px) scaleX(1);}
}
.score-popup{
  position:fixed;font-size:0.7rem;pointer-events:none;
  z-index:1000;animation:popUp 0.8s steps(8) forwards;
}
@keyframes popUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
</style>
</head>

<script>
var quizzes = [{"id":1212,"category":"금융용어","question":"암호화폐의 가격 변동성을 줄이기 위해 그 가치를 미국 달러화나 금 등 특정 자산의 가치에 고정하도록 설계된 암호화폐를 무엇이라 하는가?","answer":"① 스테이블코인","explanation":"스테이블코인은 가치 안정화를 위해 특정 자산에 연동되도록 설계된 암호화폐입니다. [오답해설] ② 알트코인은 비트코인 외의 모든 암호화폐를 지칭하며, 일반적으로 가격 변동성이 높습니다. ③ 밈코인은 인터넷 밈(meme)에서 유래한 암호화폐로, 투기성이 강하고 가격 변동성이 매우 큽니다. ④ CBDC(중앙은행 디지털 화폐)는 중앙은행이 발행하는 법정 디지털 화폐로, 민간이 발행하는 스테이블코인과는 다릅니다.","news_context":"“연내 도입 수요 있다” 스테이블코인 발행 앞둔 은행들이 최근 눈독들...","news_url":"https://n.news.naver.com/mnews/article/016/0002656076?sid=101","options":["① 스테이블코인","② 알트코인","③ 밈코인","④ CBDC"]},{"id":1213,"category":"금융용어","question":"대규모 클라우드 컴퓨팅 서비스를 제공하기 위해 막대한 규모의 인프라(서버, 스토리지, 네트워크 등)를 구축하고 운영하는 기업을 지칭하는 용어는?","answer":"① 하이퍼 스케일러","explanation":"하이퍼 스케일러는 대규모 클라우드 서비스를 제공하기 위한 인프라를 구축하고 운영하는 기업을 의미합니다. [오답해설] ② 핀테크 유니콘은 금융 기술 분야에서 기업 가치 10억 달러 이상을 달성한 비상장 스타트업을 지칭합니다. ③ 시스템 인테그레이터는 다양한 하드웨어와 소프트웨어를 통합하여 하나의 시스템을 구축하는 역할을 하는 기업입니다. ④ 에지 컴퓨팅 프로바이더는 데이터 소스와 가까운 곳에서 데이터를 처리하는 에지 컴퓨팅 환경을 제공하는 기업입니다.","news_context":"[KIW2026 다시보기 영상] 맨딥 싱 \"하이퍼 스케일러 투자 줄어도 메모리는 간다\"","news_url":"","options":["① 하이퍼 스케일러","② 핀테크 유니콘","③ 시스템 인테그레이터","④ 에지 컴퓨팅 프로바이더"]},{"id":1214,"category":"세부지식","question":"최근 금융당국의 가계대출 관리 강화 기조에 따라 시중은행들이 시행하고 있는 신용대출 규제 내용으로, 고소득 직장인의 신용대출 한도 변화를 가장 잘 설명한 것은?","answer":"② 신용대출 한도가 1억 원으로, 마이너스 통장 한도가 5천만 원으로 일괄 제한되었다.","explanation":"최근 금융당국의 가계대출 관리 강화 기조에 따라 시중은행들은 고소득 직장인의 신용대출 한도를 1억 원, 마이너스 통장 한도를 5천만 원으로 제한하고 있습니다. [오답해설] ① 상향 조정이 아닌 제한입니다. ③ 소득과 상관없이 무제한으로 허용되지 않으며, 오히려 한도가 제한되었습니다. ④ 신용대출 금리는 인하되지 않고 오히려 인상되거나 유지되는 추세입니다.","news_context":"억대 연봉 벌어도 마통 한도 5000만원까지…신용대출 확 조인다","news_url":"https://www.mk.co.kr/news/economy/12073109","options":["① 신용대출 한도가 5천만 원으로 일괄 상향 조정되었다.","② 신용대출 한도가 1억 원으로, 마이너스 통장 한도가 5천만 원으로 일괄 제한되었다.","③ 신용대출 한도는 소득에 따라 무제한으로 허용된다.","④ 신용대출 금리가 인하되어 한도는 유지하되 대출 부담을 줄였다."]},{"id":1215,"category":"세부지식","question":"스페이스X와 같은 기업의 신규 주식 발행 시, 일반 투자자가 주식을 배정받기 위해 청약하는 '공모주 청약'과 관련된 설명으로 옳지 않은 것은?","answer":"④ 공모주 청약 시 납입한 청약 증거금은 배정받은 주식 구매에 사용되며, 남은 금액은 전액 손실 처리되어 환불되지 않는다.","explanation":"공모주 청약 시 납입한 청약 증거금 중 배정받은 주식 구매에 사용되지 않은 금액(미배정분 및 초과분)은 청약자에게 환불됩니다. [오답해설] ① 청약 경쟁률이 높으면 한정된 공모주를 많은 사람이 신청하므로 개인당 배정받는 주식 수가 줄어듭니다. ② 균등배정은 최소 수량 이상을 모든 청약자에게 균등하게 배정하는 방식입니다. ③ 비례배정은 청약 증거금에 비례하여 주식을 배정하는 방식입니다.","news_context":"미래에셋, '스페이스X 공모주' 한주도 못 받았다…\"전액 환불\"","news_url":"","options":["① 청약 경쟁률이 높을수록 투자자가 배정받을 수 있는 주식 수가 줄어들 가능성이 크다.","② 일반적으로 균등배정 방식은 청약 증거금 규모와 상관없이 모든 청약자에게 최소 수량을 배정하는 방식이다.","③ 비례배정 방식은 청약 증거금을 많이 납입할수록 더 많은 주식을 배정받을 확률이 높아진다.","④ 공모주 청약 시 납입한 청약 증거금은 배정받은 주식 구매에 사용되며, 남은 금액은 전액 손실 처리되어 환불되지 않는다."]},{"id":1216,"category":"세부지식","question":"최근 고환율 상황에서 판매가 증가했으나 금융감독원의 자제령으로 판매가 축소된 '달러보험'에 대한 설명으로 가장 적절한 것은?","answer":"② 원화를 보험료로 납입하고 달러로 보험금을 지급받는 구조로, 환율 상승 시 보험금의 원화 가치가 증가하는 효과를 기대할 수 있다.","explanation":"달러보험은 보험료 납입과 보험금 지급 기준이 달러로 되어 있어, 환율 변동에 따라 원화 가치가 변동될 수 있는 상품입니다. [오답해설] ① 달러보험은 환율 변동에 직접적으로 영향을 받는 상품입니다. ③ 국내 거주자도 가입할 수 있으며, 환전 과정을 통해 원화로 납입 및 지급이 가능합니다. ④ 개인 투자자도 가입할 수 있는 상품입니다.","news_context":"고환율에 인기 끈 달러보험… 금감원 자제령에 판매 축소","news_url":"https://www.mk.co.kr/news/economy/12072956","options":["① 보험료 납입 및 보험금 지급이 모두 원화로 이루어지며, 환율 변동 위험이 없는 상품이다.","② 원화를 보험료로 납입하고 달러로 보험금을 지급받는 구조로, 환율 상승 시 보험금의 원화 가치가 증가하는 효과를 기대할 수 있다.","③ 달러로만 가입 및 해지가 가능하며, 국내 거주자는 가입할 수 없는 해외 전용 상품이다.","④ 주로 환헤지를 목적으로 하는 기업을 위한 특수 보험상품이다."]},{"id":1217,"category":"시사","question":"한국은행 총재가 \"늦지 않게 금리 인상\"을 언급한 것과 같이, 중앙은행이 기준금리를 인상할 때 일반적으로 기대하는 경제적 효과를 모두 고른 것은?\n(가) 물가 안정\n(나) 시중 유동성 감소\n(다) 경기 활성화\n(라) 가계 부채 증가 억제","answer":"④ (가), (나), (라)","explanation":"기준금리 인상은 대출 이자 부담을 늘려 시중 유동성을 줄이고(나), 이는 물가 상승 압력을 완화하여 물가를 안정시키며(가), 가계 및 기업의 부채 증가를 억제하는 효과(라)를 가져옵니다. [오답해설] (다) 경기 활성화는 금리 인상으로 인한 투자 및 소비 위축으로 달성하기 어려운 효과입니다. 오히려 경기 둔화를 야기할 수 있습니다.","news_context":"한은 총재 “집값 상승 기대 높아졌다…늦지 않게 금리 인상”","news_url":"https://www.mk.co.kr/news/economy/12072480","options":["① (가), (나)","② (가), (다)","③ (나), (라)","④ (가), (나), (라)"]},{"id":1218,"category":"시사","question":"최근 지속되는 고환율이 국내 경제에 미치는 영향에 대한 설명으로 옳지 않은 것은?","answer":"④ 해외로부터 유입되는 외국인 투자 자금이 증가하고, 국내 자본의 해외 유출이 감소한다.","explanation":"고환율은 외국인 투자자 입장에서 환차손 우려를 키워 국내 투자를 위축시킬 수 있으며, 국내 자본의 해외 유출은 해외 자산 구매 비용이 늘어나기 때문에 오히려 감소하는 경향이 있습니다. [오답해설] ① 고환율은 해외 시장에서 국내 상품의 가격 경쟁력을 높여 수출에 긍정적일 수 있습니다. ② 수입품의 원화 가격이 상승하므로 수입 물가가 상승하여 국내 물가 상승 압력이 커집니다. ③ 원자재를 해외에서 수입하는 기업은 원화로 더 많은 대가를 지불해야 하므로 원가 부담이 커집니다.","news_context":"靑 \"대미투자 판단할 환율 레벨 있는 것 아냐…좀 안정화 돼야\"","news_url":"","options":["① 수출 기업의 가격 경쟁력이 개선되어 수출이 증가할 수 있다.","② 수입 물가가 상승하여 국내 물가 상승 압력이 커질 수 있다.","③ 원자재 수입 의존도가 높은 기업의 원가 부담이 가중될 수 있다.","④ 해외로부터 유입되는 외국인 투자 자금이 증가하고, 국내 자본의 해외 유출이 감소한다."]},{"id":1219,"category":"시사","question":"가상자산 투자 소득에 대한 세금 신고와 관련하여 뉴스 기사에 언급된 내용으로 옳은 것은?","answer":"④ 특정 기간에 발생한 가상자산 소득에 대한 세금 신고를 놓칠 경우 과태료가 부과될 수 있다.","explanation":"뉴스 기사는 '6월 신고 놓치면 수천만원 과태료'라고 명시하며 특정 시점의 신고 의무를 강조하고 있습니다. 이는 가상자산 관련 증여세 등 기존 세법 적용 소득에 대한 신고를 의미할 수 있습니다. [오답해설] ① 가상자산 소득세는 일반적으로 자동 신고되지 않으며, 별도 신고가 필요할 수 있습니다. ② 세금 납부 의무는 법규에 따라 다르며, 2026년 이전에 발생한 소득에 대한 신고 의무가 있을 수 있습니다. ③ 기사 내용에 따르면 올해 6월에도 특정 신고 의무가 있을 수 있음을 시사합니다.","news_context":"코인세금 내년부터 아닌가요? … 6월 신고 놓치면 수천만원 과태료 [리치 되는 절세법]","news_url":"https://www.mk.co.kr/news/economy/12073080","options":["① 가상자산 소득세는 현재 연말정산 시 자동 신고되므로 별도 신고가 필요 없다.","② 2026년 1월 1일 이후 발생한 가상자산 소득에 대해서만 세금 납부 의무가 발생한다.","③ 가상자산 소득세 신고는 내년부터 시작되므로, 올해 6월에는 신고 의무가 없다.","④ 특정 기간에 발생한 가상자산 소득에 대한 세금 신고를 놓칠 경우 과태료가 부과될 수 있다."]},{"id":1220,"category":"시사","question":"최근 금융당국과 시중은행이 가계대출을 적극적으로 규제하고 한도를 조이는 주요 목적으로 가장 적절한 것은?","answer":"③ 가계 부채 증가 속도를 조절하고 금융 시스템의 잠재적 위험을 관리하기 위함이다.","explanation":"가계대출 규제 강화는 가계 부채의 건전성을 확보하고, 과도한 부채가 금융 시스템 전반에 미칠 수 있는 위험을 사전에 방지하기 위한 목적이 가장 큽니다. [오답해설] ① 가계대출 규제는 부동산 시장 과열을 막고 안정화를 도모하는 측면이 강합니다. ② 은행의 수익성 증대는 규제의 직접적인 목적이 아니며, 규제로 인해 대출이 줄어들면 단기적으로 수익성이 악화될 수도 있습니다. ④ 개인의 소비 위축은 규제의 부수적 효과일 수 있으나, 주된 목적은 아닙니다.","news_context":"‘빚투’에 신용대출 1.6조 급증…시중은행 가계대출, 이달 들어 2.8조 ‘쑥’","news_url":"https://www.mk.co.kr/news/economy/12073287","options":["① 주택 시장 활성화를 위해 자금의 부동산 유입을 유도하기 위함이다.","② 은행의 수익성 증대를 위해 대출 금리를 인상하고 신규 대출을 억제하기 위함이다.","③ 가계 부채 증가 속도를 조절하고 금융 시스템의 잠재적 위험을 관리하기 위함이다.","④ 개인의 소비 활동을 위축시켜 저축률을 높이고자 하는 정책의 일환이다."]},{"id":1221,"category":"시사","question":"지방자치단체 '시금고' 지정과 관련하여, 지자체가 시금고를 선정할 때 주로 고려하는 평가 요소로 가장 거리가 먼 것은?","answer":"④ 은행의 총자산 규모 및 주식 시장에서의 시가총액","explanation":"시금고 선정은 해당 은행이 지자체의 자금을 얼마나 안정적이고 효율적으로 관리할 수 있는지, 그리고 지역사회에 얼마나 기여하는지에 중점을 둡니다. 은행의 총자산 규모나 시가총액은 간접적인 평가 요소일 수 있으나, 직접적인 선정 기준으로 보기는 어렵습니다. [오답해설] ① 지역사회 기여 및 인프라 구축은 시금고 선정 시 중요한 평가 요소입니다. ② 지자체 자금의 안정적 운용을 위해 재정 안정성과 투명성은 필수적인 평가 요소입니다. ③ 금고 운영 능력과 전산 시스템의 안정성은 효율적인 자금 관리를 위해 매우 중요합니다.","news_context":"부산시, 시금고 지정 공정성 강화…심사위원 과반을 민간에","news_url":"https://www.yna.co.kr/view/AKR20260612116400051","options":["① 지역사회 기여도 및 금융 인프라 구축 노력","② 재정 안정성 및 자금 운용의 투명성","③ 금고 운영 능력 및 전산 시스템 안정성","④ 은행의 총자산 규모 및 주식 시장에서의 시가총액"]}];
var current = 0;
var score = 0;
var answered = false;
var audioCtx = null;

function getTagClass(cat) {
  if (cat === '금융용어') return 'tag-금융용어';
  if (cat === '시사') return 'tag-시사';
  if (cat === '세부지식') return 'tag-세부지식';
  return 'tag-default';
}

function render() {
  if (current >= quizzes.length) { showResult(); return; }
  var q = quizzes[current];
  var pct = (current / quizzes.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = current + '/' + quizzes.length;

  var optHtml = '';
  for (var i = 0; i < q.options.length; i++) {
    optHtml += '<button class="option" onclick="selectOpt(this,' + i + ')">' + q.options[i] + '</button>';
  }

  var expParts = (q.explanation || '').split('[오답해설]');
  var expHtml = expParts.length === 2
    ? expParts[0].trim() + '<br><br><strong>[오답해설]</strong><br>' + expParts[1].trim()
    : (q.explanation || '');

  var newsHtml = '';
  if (q.news_context) {
    newsHtml = '<div class="news-ctx">📰 ' + q.news_context;
    if (q.news_url) newsHtml += ' <a href="' + q.news_url + '" target="_blank" class="news-link">[원문]</a>';
    newsHtml += '</div>';
  }

  document.getElementById('quizArea').innerHTML =
    '<div class="quiz-card">' +
    '<span class="category-tag ' + getTagClass(q.category) + '">' + q.category + '</span>' +
    '<div class="question-text">' + q.question + '</div>' +
    '<div class="options" id="opts">' + optHtml + '</div>' +
    '<div class="explanation" id="exp">' +
    '<div class="exp-label">📖 EXPLANATION</div>' +
    expHtml + newsHtml +
    '</div>' +
    '</div>' +
    '<div class="nav-buttons">' +
    '<button class="btn btn-next" id="nextBtn" onclick="nextQ()">' +
    (current === quizzes.length - 1 ? 'RESULT ▶' : 'NEXT ▶') +
    '</button></div>';

  answered = false;
}

function selectOpt(el, idx) {
  if (answered) return;
  answered = true;
  var q = quizzes[current];
  var opts = document.querySelectorAll('.option');
  var getNum = function(s) { var m = s.match(/[①②③④]/); return m ? m[0] : ''; };
  var selNum = getNum(el.textContent);
  var ansNum = getNum(q.answer);
  var isCorrect = selNum && ansNum && selNum === ansNum;

  for (var i = 0; i < opts.length; i++) {
    opts[i].disabled = true;
    if (getNum(opts[i].textContent) === ansNum) opts[i].classList.add('correct');
    else if (opts[i] === el && !isCorrect) opts[i].classList.add('wrong');
  }

  if (isCorrect) score++;

  var rect = el.getBoundingClientRect();
  spawnCoins(rect.left + rect.width/2, rect.top + rect.height/2, isCorrect);
  showScorePopup(isCorrect);
  playBeep(isCorrect);

  document.getElementById('exp').classList.add('show');
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQ() { current++; render(); }

function showResult() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressLabel').textContent = quizzes.length + '/' + quizzes.length;
  var r = document.getElementById('resultCard');
  r.classList.add('show');
  document.getElementById('resultScore').textContent = score;
  var coinRow = document.getElementById('coinRow');
  coinRow.innerHTML = '';
  for (var i = 0; i < quizzes.length; i++) {
    var c = document.createElement('div');
    c.className = 'coin' + (i < score ? '' : ' empty');
    c.textContent = i < score ? '💰' : '';
    coinRow.appendChild(c);
  }
}

function spawnCoins(x, y, correct) {
  if (!correct) return;
  var stars = document.getElementById('stars');
  for (var i = 0; i < 5; i++) {
    var coin = document.createElement('div');
    coin.className = 'coin-item';
    coin.style.left = (x - 12 + (Math.random()-0.5)*60) + 'px';
    coin.style.top = (y - 12) + 'px';
    coin.style.animationDelay = (i * 0.06) + 's';
    stars.appendChild(coin);
    setTimeout(function(c){ stars.removeChild(c); }, 800, coin);
  }
}

function showScorePopup(correct) {
  var popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.style.left = '50%';
  popup.style.top = '40%';
  popup.style.color = correct ? 'var(--yellow)' : 'var(--red)';
  popup.textContent = correct ? '+1 !' : 'MISS!';
  document.body.appendChild(popup);
  setTimeout(function(){ document.body.removeChild(popup); }, 800);
}

function playBeep(correct) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'square';
    if (correct) {
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
    } else {
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.setValueAtTime(150, audioCtx.currentTime + 0.15);
    }
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.4);
  } catch(e) {}
}

document.addEventListener('click', function() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
