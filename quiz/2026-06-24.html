<style>
:root{
  --sky:#5bc8f5;--sky-dark:#3aa8d8;--pink:#ff6eb4;--pink-dark:#d94f96;
  --yellow:#ffd700;--yellow-dark:#e6a800;--cream:#fff8e7;--navy:#1a1a6e;
  --purple:#8b5cf6;--green:#22c55e;--green-dark:#16a34a;--red:#ef4444;--white:#ffffff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--sky);font-family:'Press Start 2P',monospace;min-height:100vh;overflow-x:hidden;padding-bottom:2rem;}
.wrap{max-width:640px;margin:0 auto;padding:1rem;}
.bg{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;}
.cloud{position:absolute;background:white;}
.cloud::before,.cloud::after{content:'';position:absolute;background:white;}
.c1{width:48px;height:16px;top:12%;left:5%;animation:cloudMove 18s linear infinite;}
.c1::before{width:24px;height:16px;top:-12px;left:8px;}
.c1::after{width:16px;height:12px;top:-8px;left:24px;}
.c2{width:96px;height:24px;top:8%;left:55%;animation:cloudMove 26s linear infinite 4s;}
.c2::before{width:48px;height:24px;top:-18px;left:16px;}
.c2::after{width:32px;height:16px;top:-10px;left:52px;}
.c3{width:140px;height:32px;top:18%;left:20%;animation:cloudMove 35s linear infinite 10s;}
.c3::before{width:72px;height:32px;top:-24px;left:24px;}
.c3::after{width:48px;height:20px;top:-14px;left:72px;}
@keyframes cloudMove{0%{transform:translateX(-200px)}100%{transform:translateX(110vw)}}
.content{position:relative;z-index:1;}
.title-card{background:var(--cream);border:6px solid var(--navy);box-shadow:8px 8px 0 var(--navy);padding:1.5rem;margin-bottom:1.5rem;text-align:center;position:relative;}
.title-card::before{content:'';position:absolute;top:-6px;left:-6px;right:-6px;bottom:-6px;border:3px solid var(--pink);pointer-events:none;}
.title-main{font-family:'Black Han Sans',sans-serif;font-size:clamp(3rem,12vw,5rem);color:#5bc8f5;-webkit-text-stroke:4px var(--navy);text-shadow:6px 6px 0 var(--navy);line-height:1.2;margin-bottom:0.5rem;letter-spacing:4px;}
.title-sub{font-size:0.45rem;color:var(--purple);letter-spacing:1px;}
.date-badge{display:inline-block;margin-top:0.8rem;background:var(--navy);color:var(--yellow);border:3px solid var(--yellow);padding:4px 12px;font-size:0.5rem;}
.progress-wrap{background:var(--navy);border:4px solid #000;height:24px;margin-bottom:1.5rem;position:relative;box-shadow:4px 4px 0 #000;}
.progress-bar{height:100%;background:var(--yellow);transition:width 0.3s steps(8);}
.progress-label{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:0.5rem;color:var(--navy);}
.quiz-card{background:var(--cream);border:4px solid var(--navy);box-shadow:8px 8px 0 var(--navy);padding:1.5rem;margin-bottom:1.5rem;animation:popIn 0.2s steps(4) forwards;}
@keyframes popIn{0%{transform:scale(0.95);opacity:0}100%{transform:scale(1);opacity:1}}
.category-tag{display:inline-block;padding:0.4rem 0.8rem;font-size:0.6rem;margin-bottom:1rem;border:3px solid;}
.tag-금융용어{background:var(--yellow);color:var(--navy);border-color:var(--yellow-dark);}
.tag-시사{background:var(--green);color:white;border-color:var(--green-dark);}
.tag-세부지식{background:var(--purple);color:white;border-color:#6d28d9;}
.tag-default{background:var(--pink);color:white;border-color:var(--pink-dark);}
.question-text{font-family:'Noto Sans KR',sans-serif;font-size:0.95rem;line-height:1.8;color:var(--navy);margin-bottom:1.5rem;font-weight:700;}
.options{display:flex;flex-direction:column;gap:0.8rem;}
.option{background:var(--white);border:4px solid var(--navy);box-shadow:4px 4px 0 var(--navy);padding:0.8rem 1rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;font-weight:700;color:var(--navy);text-align:left;width:100%;transition:transform 0.1s steps(2),box-shadow 0.1s steps(2);display:flex;align-items:center;line-height:1.5;}
.option:hover:not(:disabled){transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--navy);background:var(--yellow);}
.option:active:not(:disabled){transform:translate(4px,4px);box-shadow:0 0 0 var(--navy);}
.option.correct{background:var(--green)!important;color:white!important;border-color:var(--green-dark)!important;box-shadow:4px 4px 0 var(--green-dark)!important;animation:correctFlash 0.3s steps(2) 2;}
.option.wrong{background:var(--red)!important;color:white!important;border-color:#b91c1c!important;box-shadow:4px 4px 0 #b91c1c!important;animation:wrongShake 0.3s steps(3);}
.option:disabled{cursor:default;}
@keyframes correctFlash{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes wrongShake{0%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}100%{transform:translateX(0)}}
.explanation{display:none;background:var(--navy);color:var(--cream);border:4px solid #000;padding:1.2rem;margin-top:1rem;font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;line-height:1.8;}
.explanation.show{display:block;}
.exp-label{font-family:'Press Start 2P',monospace;font-size:0.5rem;color:var(--yellow);margin-bottom:0.8rem;}
.news-ctx{margin-top:0.8rem;padding:0.6rem;background:rgba(255,255,255,0.1);border-left:4px solid var(--yellow);font-size:0.78rem;color:var(--cream);}
.news-link{color:var(--yellow);text-decoration:underline;}
.nav-buttons{display:flex;gap:0.8rem;margin-top:0.5rem;}
.btn{flex:1;background:var(--pink);color:white;border:4px solid var(--navy);box-shadow:4px 4px 0 var(--navy);padding:0.8rem;font-family:'Press Start 2P',monospace;font-size:0.6rem;cursor:pointer;display:none;}
.btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--navy);}
.result-card{background:var(--cream);border:6px solid var(--navy);box-shadow:8px 8px 0 var(--navy);padding:2rem;text-align:center;display:none;animation:popIn 0.3s steps(4);}
.result-card.show{display:block;}
.result-title{font-family:'Noto Sans KR',sans-serif;font-size:1.2rem;font-weight:900;color:var(--navy);text-shadow:2px 2px 0 var(--pink);margin-bottom:1rem;line-height:2;}
.result-score{font-size:3rem;color:var(--yellow);text-shadow:4px 4px 0 var(--yellow-dark),8px 8px 0 #000;margin-bottom:0.5rem;display:block;}
.result-total{font-size:0.5rem;color:var(--navy);margin-bottom:1.5rem;}
.btn-main{background:var(--navy);color:var(--yellow);border:4px solid var(--yellow);box-shadow:4px 4px 0 #000;padding:1rem 2rem;font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;text-decoration:none;display:inline-block;margin-top:1rem;}
.btn-main:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #000;}
.stars{position:fixed;pointer-events:none;z-index:999;}
.coin-item{position:absolute;width:24px;height:24px;background:var(--yellow);border:3px solid var(--yellow-dark);display:flex;align-items:center;justify-content:center;font-size:0.5rem;color:var(--navy);animation:coinUp 0.7s steps(8) forwards;box-shadow:2px 2px 0 #000;}
.coin-item::before{content:'₩';font-size:0.55rem;font-weight:900;}
@keyframes coinUp{0%{opacity:1;transform:translateY(0) scaleX(1);}25%{transform:translateY(-30px) scaleX(0.3);}50%{transform:translateY(-60px) scaleX(1);}75%{transform:translateY(-80px) scaleX(0.3);}100%{opacity:0;transform:translateY(-100px) scaleX(1);}}
.score-popup{position:fixed;font-size:0.7rem;pointer-events:none;z-index:1000;animation:popUp 0.8s steps(8) forwards;}
@keyframes popUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
</style>
</head>

<script>
var quizzes = [{"id":1352,"category":"금융용어","question":"다음 중 명목화폐나 실물자산 등 특정 자산의 가치에 연동하여 가격 변동성을 최소화하도록 설계된 암호화폐를 일컫는 용어는?","answer":"① 스테이블코인","explanation":"스테이블코인은 명목화폐나 실물자산 등에 가치를 연동하여 가격 변동성을 최소화한 암호화폐입니다. [오답해설] ② CBDC(Central Bank Digital Currency)는 중앙은행이 발행하는 디지털 화폐입니다. ③ 알트코인은 비트코인을 제외한 모든 암호화폐를 지칭하는 용어입니다. ④ 토큰은 블록체인 기반의 디지털 자산 중 코인 외의 것을 통칭하는 경우가 많습니다.","news_context":"교보생명, 원화 스테이블코인 보험료 납부 기술검증 완료 기사에서 스테이블코인이 언급되었습니다.","news_url":"http://www.finomy.com/news/articleView.html?idxno=256184","options":["① 스테이블코인","② CBDC","③ 알트코인","④ 토큰"]},{"id":1353,"category":"금융용어","question":"MSCI 선진지수 편입 불발의 주요 원인 중 하나로 지적되는, 국내 외환시장의 개방성 부족을 의미하는 개념은? (원화의 자유로운 해외 거래가 제한되는 현상)","answer":"③ 역외거래 제한","explanation":"MSCI 선진지수 편입에 걸림돌이 되는 원화 역외거래 제한은 국내 외환시장의 접근성을 낮추는 요인으로 지적됩니다. [오답해설] ① 핫머니는 단기적인 이익을 좇아 국가 간을 이동하는 자금을 의미합니다. ② 캐리 트레이드는 저금리 통화로 자금을 조달하여 고금리 통화 자산에 투자하는 전략입니다. ④ 환투기는 환율 변동을 예측하여 차익을 얻으려는 거래 행위를 의미합니다.","news_context":"한국 증시, MSCI 선진국 편입 또 불발 관련 기사에서 원화 유동성 과제, 원화 폐쇄성 등이 언급되었습니다.","news_url":"https://n.news.naver.com/mnews/article/018/0006313544?sid=101","options":["① 핫머니","② 캐리 트레이드","③ 역외거래 제한","④ 환투기"]},{"id":1354,"category":"금융용어","question":"자산의 평가 이익 또는 손실이 발생했으나 아직 실제로 매도하지 않아 현금화되지 않은 상태의 이익 또는 손실을 의미하는 용어는?","answer":"① 미실현 손익","explanation":"미실현 손익은 자산을 매도하지 않아 현금화되지 않은 평가상의 이익이나 손실을 말합니다. [오답해설] ② 확정 손익은 자산 매각 등을 통해 실현되어 현금화가 완료된 이익 또는 손실입니다. ③ 장부 가치는 회계 장부에 기록된 자산의 가치를 의미합니다. ④ 액면 가치는 유가증권 표면에 기재된 금액을 의미합니다.","news_context":"[글로컬] 미실현 소득에 과세라니…손실도 보상해줄텐가 기사에서 미실현 소득 과세에 대한 논의가 있었습니다.","news_url":"https://www.yna.co.kr/view/AKR20260623174200546","options":["① 미실현 손익","② 확정 손익","③ 장부 가치","④ 액면 가치"]},{"id":1355,"category":"세부지식","question":"해외 장기 체류자에 대한 실손보험료 개선안이 7월부터 시행될 예정이다. 이 개선안의 주요 내용은?","answer":"④ 해외 체류 기간 동안 보험료 납부를 일시 중지하거나 납부한 보험료를 사후 환급받을 수 있다.","explanation":"7월부터 시행되는 실손보험료 개선안은 해외 장기 체류 시 보험료 납부를 중지하거나 사후 환급받을 수 있도록 하여 가입자의 부담을 덜어줍니다. [오답해설] ① 소급 환급은 개선안에 포함되지 않은 내용입니다. ② 해외 체류 기간 동안 보장을 일시적으로 중단하는 것은 가능하나 영구 중단은 아닙니다. ③ 귀국 후 보험료 할인에 대한 내용은 개선안에 포함되어 있지 않습니다.","news_context":"해외 장기체류자 입증만 하면 7월부터 실손보험료 부담 던다 기사에서 실손보험료 개선안의 내용이 다뤄졌습니다.","news_url":"https://www.mk.co.kr/news/economy/12081178","options":["① 해외 장기 체류 시 보험료를 소급하여 환급받을 수 있다.","② 해외 체류 기간 동안 실손보험의 보장을 영구 중단한다.","③ 해외 장기 체류 전 신청 시, 귀국 후 보험료를 할인받을 수 있다.","④ 해외 체류 기간 동안 보험료 납부를 일시 중지하거나 납부한 보험료를 사후 환급받을 수 있다."]},{"id":1356,"category":"세부지식","question":"금융당국이 가계대출 건전성 관리를 위해 활용하는 규제 지표 중, 차주가 1년간 갚아야 하는 모든 대출의 원리금 상환액을 연소득으로 나눈 비율을 의미하는 것은?","answer":"③ DSR","explanation":"DSR(총부채원리금상환비율)은 모든 금융권 대출의 연간 원리금 상환액을 연소득으로 나눈 값으로, 가계대출 건전성 평가에 사용됩니다. [오답해설] ① LTV(주택담보대출비율)는 주택을 담보로 대출할 때 주택 가격 대비 대출 한도를 나타내는 비율입니다. ② DTI(총부채상환비율)는 주택담보대출의 연간 원리금 상환액과 기타 대출의 연간 이자 상환액을 합산하여 연소득으로 나눈 비율입니다. ④ RTI(임대업이자상환비율)는 임대소득 대비 이자 비용 부담 능력을 나타내는 지표입니다.","news_context":"5대은행 전부 신용대출 '한도초과' 및 '빚투개미'에 신용대출 급증 관련 기사에서 가계대출 규제 완화의 부작용이 언급되었습니다.","news_url":"https://www.mk.co.kr/news/economy/12081191","options":["① LTV","② DTI","③ DSR","④ RTI"]},{"id":1357,"category":"세부지식","question":"퇴직연금 제도의 확정급여형(DB형)에 대한 설명으로 옳은 것은?","answer":"② 퇴직 시 받을 급여가 사전에 확정되어 있으며, 운용 주체는 사용자(기업)이다.","explanation":"확정급여형(DB형) 퇴직연금은 근로자가 받을 퇴직급여 수준이 사전에 정해져 있으며, 적립금 운용 책임은 사용자(기업)에게 있습니다. [오답해설] ① 운용 주체가 근로자인 것은 확정기여형(DC형)입니다. ③ 근로자의 기여금에 따라 급여가 달라지는 것은 확정기여형(DC형)입니다. ④ 운용 주체가 사용자가 아닌 근로자이며, 급여가 기여금에 따라 달라지는 것은 확정기여형(DC형)입니다.","news_context":"보수적 퇴직연금 투자 DB형서도 수익률 갈린 이유는 기사에서 퇴직연금 DB형과 DC형에 대한 언급이 있었습니다.","news_url":"https://www.mk.co.kr/news/economy/12080820","options":["① 퇴직 시 받을 급여가 사전에 확정되어 있으며, 운용 주체는 근로자이다.","② 퇴직 시 받을 급여가 사전에 확정되어 있으며, 운용 주체는 사용자(기업)이다.","③ 근로자가 납입한 기여금에 따라 퇴직급여가 달라지며, 운용 주체는 근로자이다.","④ 근로자가 납입한 기여금에 따라 퇴직급여가 달라지며, 운용 주체는 사용자(기업)이다."]},{"id":1358,"category":"시사","question":"한국 증시의 MSCI 선진지수 편입이 또다시 불발됨에 따라 국내 금융시장에 미칠 수 있는 영향으로 옳지 않은 것은?","answer":"② 외국인 투자자의 국내 증시 투자 비중이 확대될 가능성이 높아진다.","explanation":"MSCI 선진지수 편입 불발은 선진지수를 추종하는 해외 패시브 자금의 유입을 지연시켜 외국인 투자자의 국내 증시 투자 비중 확대가 어려워질 수 있습니다. [오답해설] ① 선진지수 편입 불발은 한국 증시의 저평가 요인을 지속시키는 결과를 초래합니다. ③ 정부는 MSCI 편입을 위해 외환 및 자본시장 개혁 노력을 지속할 것이라고 밝혔습니다. ④ 선진지수 편입 불발은 한국 증시의 국제적 위상 개선 및 신뢰도 향상 기회를 미루는 요인이 됩니다.","news_context":"한국 증시, MSCI지수 편입 또 불발 관련 기사에서 MSCI 선진지수 편입 불발의 원인과 영향이 다뤄졌습니다.","news_url":"https://www.mk.co.kr/news/economy/12081535","options":["① 선진지수 추종 해외 자금의 유입 지연으로 증시 저평가 요인이 지속될 수 있다.","② 외국인 투자자의 국내 증시 투자 비중이 확대될 가능성이 높아진다.","③ 국내 자본시장 개혁에 대한 정부의 노력이 더욱 강조될 수 있다.","④ 한국 증시의 국제적 위상 개선 및 신뢰도 향상 기회가 미뤄진다."]},{"id":1359,"category":"시사","question":"최근 원/달러 환율이 1,530원대를 기록하는 등 고환율 기조가 이어질 때, 국내 식품 기업과 같이 원자재 수입 의존도가 높은 기업에 미치는 가장 직접적인 영향은?","answer":"③ 원자재 수입 단가 상승으로 생산 비용 증가","explanation":"고환율 기조에서는 원자재 수입 시 더 많은 원화를 지불해야 하므로, 수입 의존도가 높은 기업의 원가 부담이 직접적으로 증가합니다. [오답해설] ① 수출 기업의 경우 가격 경쟁력 강화 요인이 될 수 있으나, 수입 의존도가 높은 식품 기업에는 해당되지 않습니다. ② 고환율은 해외 법인의 이익을 원화로 환전할 때 환차익이 아닌 환차손을 발생시킬 위험이 있습니다. ④ 환율 상승은 국내 제품의 해외 가격이 상대적으로 저렴해지는 효과를 가져와 인하 압력이 감소하는 것이 아니라 오히려 경쟁력 확보를 위해 가격 인하를 고려할 수도 있습니다.","news_context":"원/달러 환율 4.2원 내린 1,534.9원(개장) 및 식품주, 고환율에 '눈물' 기사에서 고환율의 영향이 다뤄졌습니다.","news_url":"","options":["① 수출 경쟁력 강화로 매출 증대","② 해외 법인의 이익 송금 시 환차익 발생","③ 원자재 수입 단가 상승으로 생산 비용 증가","④ 국내 생산 제품의 해외 시장 가격 인하 압력 감소"]},{"id":1360,"category":"시사","question":"최근 미국 증시에서 AI 투자 부담과 금리 공포 등으로 반도체주를 중심으로 기술주가 급락하고 있다. 이러한 현상이 국내 금융시장에 미칠 영향으로 가장 적절한 것은?","answer":"① 국내 기술주 및 성장주에 대한 투자심리가 위축되어 증시 전반의 조정 압력이 커질 수 있다.","explanation":"미국 기술주의 급락은 국내 증시에도 영향을 미쳐 기술주 및 성장주 전반의 투자심리를 위축시키고 증시 조정 압력을 높일 수 있습니다. [오답해설] ② 기술주 급락은 AI 산업의 성장성 자체를 부각하기보다는 투자 수익성에 대한 의문을 제기하여 투자심리를 위축시킬 수 있습니다. ③ 주식 시장의 불안정은 일반적으로 안전자산 선호 심리를 강화하고 고위험 자산으로의 자금 이동을 둔화시킵니다. ④ 금리 공포가 존재하는 상황에서 기술주 급락은 대출금리 하락보다는 시장 불안정을 야기하여 은행의 보수적인 대출 기조를 강화할 수 있습니다.","news_context":"AI 투자 부담에 반도체주 급락…나스닥 2.21% 하락 및 반도체주, 금리 공포와 AI 지출 우려로 월가 하락세 주도 기사에서 반도체주 및 기술주 급락의 배경과 영향이 분석되었습니다.","news_url":"","options":["① 국내 기술주 및 성장주에 대한 투자심리가 위축되어 증시 전반의 조정 압력이 커질 수 있다.","② AI 산업의 성장성이 더욱 부각되어 관련 기업의 투자 유치가 활발해질 것이다.","③ 안전자산 선호 심리가 약화되어 고위험 자산으로의 자금 이동이 가속화될 것이다.","④ 국내 은행들의 대출금리가 하락하여 기업들의 자금 조달 비용이 경감될 것이다."]},{"id":1361,"category":"시사","question":"NH농협은행을 비롯한 금융권에서 취약계층의 채무 감면 등 '포용금융' 활동을 확대하고 있다. 포용금융의 본질적 목표와 가장 거리가 먼 것은?","answer":"② 금융기관의 수익성 극대화를 위해 비대면 채널 투자를 확대하는 것.","explanation":"포용금융은 경제적 약자를 포함한 모든 사람들에게 금융 서비스를 제공하여 금융 소외를 해소하는 것이 목표이며, 금융기관의 수익성 극대화는 직접적인 목표가 아닙니다. [오답해설] ① 경제적 약자의 금융 접근성을 높여 사회 안전망을 강화하는 것은 포용금융의 핵심 목표 중 하나입니다. ③ 금융 소외계층의 자립을 지원하여 경제적 불평등을 완화하는 것은 포용금융의 중요한 가치입니다. ④ 금융 시스템의 안정성을 확보하고 지속 가능한 성장을 도모하는 것 또한 포용금융의 장기적인 목표 중 하나입니다.","news_context":"NH농협은행, 취약계층 채무 최대 90% 감면…포용금융 확대 및 금융권, 사회적 가치 창출에 집중 기사에서 금융권의 포용금융 노력이 강조되었습니다.","news_url":"https://www.fetv.co.kr/news/articleView.html?idxno=304966","options":["① 경제적 약자의 금융 접근성을 높여 사회 안전망을 강화하는 것.","② 금융기관의 수익성 극대화를 위해 비대면 채널 투자를 확대하는 것.","③ 금융 소외계층의 자립을 지원하여 경제적 불평등을 완화하는 것.","④ 금융 시스템의 안정성을 확보하고 지속 가능한 성장을 도모하는 것."]},{"id":6,"news_context":"","news_url":"","options":[]}];
var current = 0;
var score = 0;
var answered = false;
var audioCtx = null;

function getTagClass(cat) {
  if (cat === '금융용어') return 'tag-금융용어';
  if (cat === '시사') return 'tag-시사';
  if (cat === '세부지식') return 'tag-세부지식';
  return 'tag-default';
}

function render() {
  if (current >= quizzes.length) { showResult(); return; }
  var q = quizzes[current];
  var pct = (current / quizzes.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = current + '/' + quizzes.length;
  var optHtml = '';
  for (var i = 0; i < q.options.length; i++) {
    optHtml += '<button class="option" onclick="selectOpt(this,' + i + ')">' + q.options[i] + '</button>';
  }
  var expParts = (q.explanation || '').split('[오답해설]');
  var expHtml = expParts.length === 2
    ? expParts[0].trim() + '<br><br><strong>[오답해설]</strong><br>' + expParts[1].trim()
    : (q.explanation || '');
  var newsHtml = '';
  if (q.news_context) {
    newsHtml = '<div class="news-ctx">📰 ' + q.news_context;
    if (q.news_url) newsHtml += ' <a href="' + q.news_url + '" target="_blank" class="news-link">[원문]</a>';
    newsHtml += '</div>';
  }
  document.getElementById('quizArea').innerHTML =
    '<div class="quiz-card">' +
    '<span class="category-tag ' + getTagClass(q.category) + '">' + q.category + '</span>' +
    '<div class="question-text">' + q.question + '</div>' +
    '<div class="options" id="opts">' + optHtml + '</div>' +
    '<div class="explanation" id="exp">' +
    '<div class="exp-label">📖 EXPLANATION</div>' +
    expHtml + newsHtml +
    '</div>' +
    '</div>' +
    '<div class="nav-buttons">' +
    '<button class="btn btn-next" id="nextBtn" onclick="nextQ()">' +
    (current === quizzes.length - 1 ? 'RESULT ▶' : 'NEXT ▶') +
    '</button></div>';
  answered = false;
}

function selectOpt(el, idx) {
  if (answered) return;
  answered = true;
  var q = quizzes[current];
  var opts = document.querySelectorAll('.option');
  var getNum = function(s) { var m = s.match(/[①②③④]/); return m ? m[0] : ''; };
  var selNum = getNum(el.textContent);
  var ansNum = getNum(q.answer);
  var isCorrect = selNum && ansNum && selNum === ansNum;
  for (var i = 0; i < opts.length; i++) {
    opts[i].disabled = true;
    if (getNum(opts[i].textContent) === ansNum) opts[i].classList.add('correct');
    else if (opts[i] === el && !isCorrect) opts[i].classList.add('wrong');
  }
  if (isCorrect) score++;
  var rect = el.getBoundingClientRect();
  spawnCoins(rect.left + rect.width/2, rect.top + rect.height/2, isCorrect);
  showScorePopup(isCorrect);
  playBeep(isCorrect);
  document.getElementById('exp').classList.add('show');
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQ() { current++; render(); }

function showResult() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressLabel').textContent = quizzes.length + '/' + quizzes.length;
  var r = document.getElementById('resultCard');
  r.classList.add('show');
  document.getElementById('resultScore').textContent = score;
}

function spawnCoins(x, y, correct) {
  if (!correct) return;
  var stars = document.getElementById('stars');
  for (var i = 0; i < 5; i++) {
    var coin = document.createElement('div');
    coin.className = 'coin-item';
    coin.style.left = (x - 12 + (Math.random()-0.5)*60) + 'px';
    coin.style.top = (y - 12) + 'px';
    coin.style.animationDelay = (i * 0.06) + 's';
    stars.appendChild(coin);
    setTimeout(function(c){ stars.removeChild(c); }, 800, coin);
  }
}

function showScorePopup(correct) {
  var popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.style.left = '50%';
  popup.style.top = '40%';
  popup.style.color = correct ? 'var(--yellow)' : 'var(--red)';
  popup.textContent = correct ? '+1 !' : 'MISS!';
  document.body.appendChild(popup);
  setTimeout(function(){ document.body.removeChild(popup); }, 800);
}

function playBeep(correct) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'square';
    if (correct) {
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
    } else {
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.setValueAtTime(150, audioCtx.currentTime + 0.15);
    }
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.4);
  } catch(e) {}
}

document.addEventListener('click', function() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}, { once: true });

render();
</script>
