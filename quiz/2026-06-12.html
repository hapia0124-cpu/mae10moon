var quizzes=[{"id": 1171, "created_at": "2026-06-12T01:45:14.457802+00:00", "date": "2026-06-12", "category": "시사", "question": "최근 '좋아요 알바'와 같은 신종 수법을 이용한 청년층 대상 금융사기가 증가하고 있습니다. 이러한 금융사기를 예방하고 대응하기 위한 금융기관 또는 개인의 노력으로 가장 적절하지 않은 것은?", "options": ["① 개인 정보 유출 방지를 위한 보안 강화 및 의심스러운 앱 설치 자제", "② 출처가 불분명한 문자 메시지나 이메일 링크 클릭 금지", "③ 고수익을 미끼로 한 비정상적인 투자 권유는 무조건 수락", "④ 금융사기 피해 발생 시 즉시 금융기관 및 경찰에 신고"], "answer": "③ 고수익을 미끼로 한 비정상적인 투자 권유는 무조건 수락", "explanation": "고수익을 미끼로 한 비정상적인 투자 권유는 대부분 금융사기의 전형적인 수법이므로 무조건 수락해서는 안 되며, 오히려 주의하고 의심해야 합니다. [오답해설] ① 개인정보 보안 강화는 금융사기 피해를 막는 기본적인 예방책입니다. ② 스미싱, 피싱 등 사기 수법에 이용될 수 있는 링크는 클릭하지 않아야 합니다. ④ 피해 발생 시 신속한 신고는 피해 확대를 막고 사기범 검거에 중요한 역할을 합니다.", "news_context": "'좋아요 알바' 미끼로 선입금 요구…청년층 금융사기 늘었다(50), 거래소·금융기관 사칭 주의 빗썸, 사기 예방 가이드 공개(69) 기사와 관련됩니다.", "news_url": "https://www.yna.co.kr/view/AKR20260612057400002"}, {"id": 1170, "created_at": "2026-06-12T01:45:14.457802+00:00", "date": "2026-06-12", "category": "시사", "question": "최근 원/달러 환율이 급변동하면서 외환당국이 시장 안정화를 위한 조치들을 취하고 있습니다. 다음 중 외환당국이 환율 안정화를 위해 사용할 수 있는 정책 수단으로 가장 거리가 먼 것은?", "options": ["① 외환시장 개입 (달러 매도)", "② 외국환은행 대상 외환 파생거래 검사 강화", "③ 국내 주요 수출 기업에 달러 보유량 확대 요청", "④ 기준금리 인하를 통한 시중 유동성 공급 확대"], "answer": "④ 기준금리 인하를 통한 시중 유동성 공급 확대", "explanation": "기준금리 인하는 국내 통화 유동성을 확대하여 인플레이션 압력을 높이고, 일반적으로 원화 가치 하락(환율 상승) 요인으로 작용하므로 환율 안정화 목적과는 상반될 수 있습니다. [오답해설] ① 외환당국은 외환시장에서 직접 달러를 매도하여 원화 가치 하락(환율 상승)을 방어할 수 있습니다. ② 외국환은행의 투기성 외환거래를 점검하여 시장 불안 요소를 사전에 차단할 수 있습니다. ③ 기업들이 수출로 벌어들인 달러를 국내에 더 많이 보유하도록 유도하여 달러 공급을 늘릴 수 있습니다.", "news_context": "미·이란 종전 가능성에 환율, 10원 넘게 하락(89), 외국계 은행 ‘환율 투기’ 있었나…1분기 외환파생거래 28% 급증(182), “달러 좀 풀어달라”…정부, 삼성전자·현대차 등에 ‘SOS’(196), 14년만에 외국환은행 고강도 검사…환율안정 시그널 넘어 ‘액션’(218) 등 다수의 기사에서 환율 변동과 당국의 대응이 언급되었습니다.", "news_url": "https://www.mk.co.kr/news/economy/12072150"}, {"id": 1169, "created_at": "2026-06-12T01:45:14.457802+00:00", "date": "2026-06-12", "category": "시사", "question": "한국은행 총재가 \"물가안정에 중점…늦지 않게 금리 인상\"을 시사했습니다. 이처럼 중앙은행이 금리 인상 기조를 이어갈 때, 국내 경제 및 금융 시장에 미칠 수 있는 영향으로 가장 적절하지 않은 것은?", "options": ["① 가계의 대출 이자 부담 증가", "② 기업의 투자 심리 위축 및 자금 조달 비용 상승", "③ 원화 가치 상승 압력 및 외국인 자본 유입 증가", "④ 주식 시장 활성화 및 '빚투' 증가"], "answer": "④ 주식 시장 활성화 및 '빚투' 증가", "explanation": "금리 인상은 가계 및 기업의 경제 활동을 위축시키고, 주식 시장에는 부정적인 영향을 미쳐 '빚투'를 감소시키는 요인으로 작용할 가능성이 큽니다. [오답해설] ① 금리가 인상되면 변동금리 대출을 보유한 가계의 이자 상환 부담이 커집니다. ② 기업은 대출 금리 상승으로 자금 조달 비용이 증가하고, 투자 수익률 하락 우려로 투자 심리가 위축될 수 있습니다. ③ 국내 금리가 인상되면 상대적으로 높은 수익률을 찾아 외국인 자본이 유입되고, 이는 원화 가치 상승 압력으로 작용할 수 있습니다.", "news_context": "한은 총재의 금리 인상 발언 (5, 57, 171번)과 금리 인상이 경제에 미치는 영향은 금융권 시사상식의 핵심입니다.", "news_url": "https://www.hankyung.com/article/2026061225497"}, {"id": 1168, "created_at": "2026-06-12T01:45:14.457802+00:00", "date": "2026-06-12", "category": "세부지식", "question": "최근 주택도시보증공사(HUG)의 전세 보증보험 가입 요건 강화 및 보증 한도 조정과 관련하여, 다음 설명 중 옳지 않은 것은?", "options": ["① 전세가율이 시세의 90% 이하여야 가입이 가능하다.", "② 공시가격의 126% 이내로 보증 한도가 제한된다.", "③ 전세 보증금의 최고 한도액은 모든 주택에 대해 5억원으로 동일하게 적용된다.", "④ 임대인의 체납 여부 등 신뢰도 검증 절차가 강화되었다."], "answer": "③ 전세 보증금의 최고 한도액은 모든 주택에 대해 5억원으로 동일하게 적용된다.", "explanation": "전세 보증금의 최고 한도액은 주택 유형에 따라 다르게 적용됩니다 (예: 아파트 7억 원, 그 외 주택 5억 원). [오답해설] ① HUG는 깡통전세 위험 방지를 위해 전세가율을 기존 100%에서 90%로 하향 조정했습니다. ② 보증 한도는 공시가격의 126%(기존 150%)로 변경되었습니다. ④ 임대인의 과거 보증금 미반환 이력이나 세금 체납 여부 등을 확인하는 절차가 강화되었습니다.", "news_context": "20억 전세도 보증은 5억…초고가 전세 막힌 ‘보증 천장’(205) 기사와 관련됩니다.", "news_url": "https://www.mk.co.kr/news/economy/12071616"}, {"id": 1167, "created_at": "2026-06-12T01:45:14.457802+00:00", "date": "2026-06-12", "category": "세부지식", "question": "뉴스에서 언급된 DC형(확정기여형) 퇴직연금에 대한 설명으로 옳은 것을 모두 고른 것은? \n\nㄱ. 근로자가 직접 적립금 운용 방법을 선택하며, 운용 성과에 따라 퇴직급여가 달라진다.\nㄴ. 퇴직급여가 사전에 확정되어 있으며, 회사가 모든 운용 책임을 진다.\nㄷ. 일반적으로 DB형(확정급여형) 퇴직연금보다 운용의 자율성이 높다.\nㄹ. 모바일 앱을 통한 가입이 금융권 최초로 도입되는 등 접근성이 개선되고 있다.", "options": ["① ㄱ, ㄴ", "② ㄱ, ㄷ", "③ ㄱ, ㄷ, ㄹ", "④ ㄴ, ㄷ, ㄹ"], "answer": "③ ㄱ, ㄷ, ㄹ", "explanation": "DC형 퇴직연금은 근로자가 운용 주체가 되어 운용 성과에 따라 퇴직급여가 결정되는 구조이며, 운용의 자율성이 높고 모바일 가입 등 접근성이 개선되고 있습니다. [오답해설] ㄴ. 퇴직급여가 사전에 확정되어 있고 회사가 운용 책임을 지는 것은 DB형(확정급여형) 퇴직연금에 대한 설명입니다.", "news_context": "DC형 택했더니 22% 수익(177) 및 모바일 통해 퇴직연금 가입’…부산은행, 금융권 최초 도입(210) 기사와 관련됩니다.", "news_url": "https://www.mk.co.kr/news/economy/12072278"}, {"id": 1166, "created_at": "2026-06-12T01:45:14.457802+00:00", "date": "2026-06-12", "category": "세부지식", "question": "최근 금융당국의 '빚투' 경고와 가계대출 증가세에 대응하여 국내 시중은행들이 시행하고 있는 신용대출 관리 강화 조치로 가장 거리가 먼 것은?", "options": ["① 신용대출 한도 축소", "② 고신용자 대상 신용대출 금리 인하", "③ 비대면 신용대출 갈아타기 접수 일시 중단", "④ 특정 대출 플랫폼을 통한 신용대출 취급 제한"], "answer": "② 고신용자 대상 신용대출 금리 인하", "explanation": "은행권은 가계대출 관리 차원에서 신용대출 한도를 줄이고 조건 등을 강화하고 있으며, 금리 인하는 대출 증가를 부추길 수 있어 일반적으로 시행되지 않습니다. [오답해설] ① 은행들은 '빚투' 경고에 따라 신용대출 한도를 줄여 대출 총량을 관리하고 있습니다. ③ 일부 은행은 비대면 신용대출 갈아타기 서비스를 일시 중단하여 대출 증가세를 억제하고 있습니다. ④ 특정 대출 비교 플랫폼을 통한 신규 신용대출 취급을 중단하는 사례도 있습니다.", "news_context": "한도 줄이는 은행들…신용대출 문턱 높아진다(28), 우리은행, 비대면 신용대출 갈아타기 접수 중단(156), 연봉 수십억 벌어도 신용대출은 1억까지만…은행권, 예외 없앤다(174) 등 다수의 기사에서 은행권의 신용대출 조이기 정책이 언급되었습니다.", "news_url": "https://www.hankyung.com/article/202606122331i"}, {"id": 1165, "created_at": "2026-06-12T01:45:14.457802+00:00", "date": "2026-06-12", "category": "금융용어", "question": "빚을 내어 주식이나 부동산 등 위험자산에 투자하는 행위를 의미하는 신조어로, 과도한 투자 심리를 보여주는 단어는 무엇인가?", "options": ["① 빚투", "② 영끌", "③ 동학개미", "④ 갭투자"], "answer": "① 빚투", "explanation": "빚투는 빚을 내어 투자하는 행위를 의미하는 신조어입니다. [오답해설] ② 영끌은 '영혼까지 끌어모은다'는 의미로 자산을 최대한 활용하여 주택 등을 매수하는 행위를 지칭합니다. ③ 동학개미는 국내 주식 시장에 참여하는 개인 투자자들을 일컫는 말입니다. ④ 갭투자는 전세 보증금을 활용하여 실제 매매가와 전세가의 차이(갭)만큼의 소액으로 주택을 매수하는 투자 방식입니다.", "news_context": "은행권의 신용대출 조이기 소식과 함께 '빚투'에 대한 경고가 여러 뉴스(77, 87, 170 등)에서 언급되었습니다.", "news_url": "https://www.yna.co.kr/view/AKR20260612041351002"}, {"id": 1162, "created_at": "2026-06-12T01:45:14.457802+00:00", "date": "2026-06-12", "category": "금융용어", "question": "암호화폐의 가격 변동성을 줄이기 위해 법정화폐나 다른 자산에 가치를 연동하여 안정성을 확보하려는 암호화폐를 무엇이라고 하는가?", "options": ["① 스테이블코인", "② 중앙은행 디지털 화폐 (CBDC)", "③ 알트코인", "④ 대체 불가능 토큰 (NFT)"], "answer": "① 스테이블코인", "explanation": "스테이블코인은 암호화폐의 가격 변동성을 줄이기 위해 법정화폐나 다른 자산에 가치를 연동한 암호화폐입니다. [오답해설] ② 중앙은행 디지털 화폐(CBDC)는 중앙은행이 발행하는 디지털 형태의 법정화폐를 의미합니다. ③ 알트코인은 비트코인을 제외한 모든 암호화폐를 통칭하는 용어입니다. ④ 대체 불가능 토큰(NFT)은 블록체인 기술을 활용하여 디지털 자산에 고유한 소유권을 부여하는 토큰입니다.", "news_context": "모두투어가 스테이블코인 결제 인프라 검증을 확대한다는 뉴스 (2번)와 관련됩니다.", "news_url": "https://www.hankyung.com/article/202606122414g"}, {"id": 1163, "created_at": "2026-06-12T01:45:14.457802+00:00", "date": "2026-06-12", "category": "금융용어", "question": "주식시장 급변 시 시장의 과열을 진정시키기 위해 발동되는 프로그램 매매 일시 정지 조치 중, 코스피200 선물 가격이 전일 종가 대비 5% 이상 상승하여 1분간 지속될 경우 발동되는 제도는 무엇인가?", "options": ["① 매수 사이드카", "② 매도 사이드카", "③ 서킷브레이커", "④ 숏스퀴즈"], "answer": "① 매수 사이드카", "explanation": "매수 사이드카는 코스피200 선물 가격이 전일 종가 대비 5% 이상 상승하여 1분간 지속될 경우 발동되는 프로그램 매매 일시 정지 조치입니다. [오답해설] ② 매도 사이드카는 코스피200 선물 가격이 전일 종가 대비 5% 이상 하락하여 1분간 지속될 경우 발동됩니다. ③ 서킷브레이커는 주식시장이 과열되거나 폭락할 때 시장 전체의 거래를 일시적으로 중단시키는 조치입니다. ④ 숏스퀴즈는 공매도 포지션을 취한 투자자들이 손실을 줄이기 위해 주식을 다시 매수하면서 주가가 급등하는 현상을 말합니다.", "news_context": "코스피 급등에 매수 사이드카가 발동되었다는 뉴스 (32번)와 관련됩니다.", "news_url": "https://www.hankyung.com/article/2026061223116"}, {"id": 1164, "created_at": "2026-06-12T01:45:14.457802+00:00", "date": "2026-06-12", "category": "금융용어", "question": "타인 자본을 지렛대처럼 이용하여 자기자본수익률을 높이는 투자 전략을 의미하는 금융 용어는 무엇인가?", "options": ["① 레버리지", "② 디레버리지", "③ 헤지", "④ 인버스"], "answer": "① 레버리지", "explanation": "레버리지는 타인 자본을 지렛대처럼 이용하여 자기자본수익률을 높이는 투자 전략을 의미합니다. [오답해설] ② 디레버리지는 부채를 줄이는 행위를 의미합니다. ③ 헤지는 환율, 금리 등의 변동 위험을 줄이기 위한 방어적 투자 전략입니다. ④ 인버스는 주가지수 등의 하락에 베팅하여 수익을 얻는 투자 상품입니다.", "news_context": "수익률 상위 고수들이 레버리지는 팔았다는 뉴스 (44번)와 관련됩니다.", "news_url": "https://www.hankyung.com/article/202606122220i"}];
var current=0;var score=0;var answered=false;var audioCtx=null;
function getTagClass(cat){if(cat==='금융용어')return 'tag-금융용어';if(cat==='시사')return 'tag-시사';if(cat==='세부지식')return 'tag-세부지식';return 'tag-default';}
function render(){
  if(current>=quizzes.length){showResult();return;}
  var q=quizzes[current];
  document.getElementById('progressBar').style.width=(current/quizzes.length*100)+'%';
  document.getElementById('progressLabel').textContent=current+'/'+quizzes.length;
  var optHtml='';for(var i=0;i<q.options.length;i++)optHtml+='<button class="option" onclick="selectOpt(this,'+i+')">'+q.options[i]+'</button>';
  var expParts=(q.explanation||'').split('[오답해설]');
  var expHtml=expParts.length>1?expParts[0].trim()+'<br><br><strong>[오답해설]</strong><br>'+expParts.slice(1).map(function(p){return p.trim();}).join('<br>'):q.explanation||'';
  var newsHtml='';if(q.news_context){newsHtml='<div class="news-ctx">📰 '+q.news_context;if(q.news_url)newsHtml+=' <a href="'+q.news_url+'" target="_blank" class="news-link">[원문]</a>';newsHtml+='</div>';}
  document.getElementById('quizArea').innerHTML='<div class="quiz-card"><span class="category-tag '+getTagClass(q.category)+'">'+q.category+'</span><div class="question-text">'+q.question+'</div><div class="options">'+optHtml+'</div><div class="explanation" id="exp"><div class="exp-label">📖 EXPLANATION</div>'+expHtml+newsHtml+'</div></div><div class="nav-buttons"><button class="btn" id="nextBtn" onclick="nextQ()">'+(current===quizzes.length-1?'RESULT ▶':'NEXT ▶')+'</button></div>';
  answered=false;
}
function selectOpt(el,idx){
  if(answered)return;answered=true;
  var q=quizzes[current];var opts=document.querySelectorAll('.option');
  var getNum=function(s){var m=s.match(/[①②③④]/);return m?m[0]:''};
  var isCorrect=getNum(el.textContent)&&getNum(q.answer)&&getNum(el.textContent)===getNum(q.answer);
  for(var i=0;i<opts.length;i++){opts[i].disabled=true;if(getNum(opts[i].textContent)===getNum(q.answer))opts[i].classList.add('correct');else if(opts[i]===el&&!isCorrect)opts[i].classList.add('wrong');}
  if(isCorrect)score++;
  var rect=el.getBoundingClientRect();spawnCoins(rect.left+rect.width/2,rect.top+rect.height/2,isCorrect);showScorePopup(isCorrect);playBeep(isCorrect);
  document.getElementById('exp').classList.add('show');document.getElementById('nextBtn').style.display='block';
}
function nextQ(){current++;render();}
function showResult(){document.getElementById('quizArea').style.display='none';document.getElementById('progressBar').style.width='100%';document.getElementById('progressLabel').textContent=quizzes.length+'/'+quizzes.length;document.getElementById('resultCard').classList.add('show');document.getElementById('resultScore').textContent=score;}
function spawnCoins(x,y,correct){if(!correct)return;var s=document.getElementById('stars');for(var i=0;i<5;i++){var c=document.createElement('div');c.className='coin-item';c.style.left=(x-12+(Math.random()-0.5)*60)+'px';c.style.top=(y-12)+'px';c.style.animationDelay=(i*0.06)+'s';s.appendChild(c);setTimeout(function(cc){s.removeChild(cc);},800,c);}}
function showScorePopup(correct){var p=document.createElement('div');p.className='score-popup';p.style.left='50%';p.style.top='40%';p.style.color=correct?'var(--yellow)':'var(--red)';p.textContent=correct?'+1 !':'MISS!';document.body.appendChild(p);setTimeout(function(){document.body.removeChild(p);},800);}
function playBeep(correct){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();var o=audioCtx.createOscillator();var g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='square';if(correct){o.frequency.setValueAtTime(523,audioCtx.currentTime);o.frequency.setValueAtTime(659,audioCtx.currentTime+0.1);o.frequency.setValueAtTime(784,audioCtx.currentTime+0.2);}else{o.frequency.setValueAtTime(200,audioCtx.currentTime);o.frequency.setValueAtTime(150,audioCtx.currentTime+0.15);}g.gain.setValueAtTime(0.15,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+0.4);}catch(e){}}
document.addEventListener('click',function(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();},{once:true});
render();
</script>
