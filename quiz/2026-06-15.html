:root{

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--sky);font-family:'Press Start 2P',monospace;min-height:100vh;overflow-x:hidden;padding-bottom:2rem;}

.bg{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;}

.cloud::before,.cloud::after{content:'';position:absolute;background:white;}
.c1{width:48px;height:16px;top:12%;left:5%;animation:cloudMove 18s linear infinite;}
.c1::before{width:24px;height:16px;top:-12px;left:8px;}
.c1::after{width:16px;height:12px;top:-8px;left:24px;}
.c2{width:96px;height:24px;top:8%;left:55%;animation:cloudMove 26s linear infinite 4s;}
.c2::before{width:48px;height:24px;top:-18px;left:16px;}
.c2::after{width:32px;height:16px;top:-10px;left:52px;}
.c3{width:140px;height:32px;top:18%;left:20%;animation:cloudMove 35s linear infinite 10s;}
.c3::before{width:72px;height:32px;top:-24px;left:24px;}

.btn-main{background:var(--navy);color:var(--yellow);border:4px solid var(--yellow);box-shadow:4px 4px 0 #000;padding:1rem 2rem;font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;text-decoration:none;display:inline-block;margin-top:1rem;}

.score-popup{position:fixed;font-size:0.7rem;pointer-events:none;z-index:1000;animation:popUp 0.8s steps(8) forwards;}
@keyframes popUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}

<script>
var quizzes = [{"id":1232,"category":"금융용어","question":"특정 기초자산의 일간 수익률을 몇 배수로 추종하도록 설계된 상장지수펀드로, 시장 변동성이 큰 시기에 수익을 극대화하려는 투자자에게 인기가 높지만, 손실 또한 크게 확대될 수 있는 특징을 가진 금융상품은 무엇인가?","answer":"① 레버리지 ETF","explanation":"레버리지 ETF는 기초자산 수익률의 일정 배율을 추종하여 높은 수익을 기대할 수 있지만, 손실 위험도 그만큼 커지는 상품입니다. [오답해설] ② 인버스 ETF는 기초자산 가격이 하락할 때 수익을 얻는 상품입니다. ③ 액티브 ETF는 펀드매니저가 적극적으로 운용하여 시장수익률을 초과하는 것을 목표로 하는 상품입니다. ④ 채권 ETF는 다양한 채권에 투자하여 수익을 추구하는 상품입니다.","news_context":"반도체 소부장 투자 열풍 속 레버리지 ETF에도 뭉칫돈이 몰리고 있다는 뉴스입니다.","news_url":"","options":["① 레버리지 ETF","② 인버스 ETF","③ 액티브 ETF","④ 채권 ETF"]},{"id":1233,"category":"금융용어","question":"국내 기업이나 금융기관이 해외에서 외화를 조달하기 위해 발행하는 채권으로, 주로 역외시장에서 외국인 투자자를 대상으로 발행되며, 국내 채권 발행 규제로부터 비교적 자유로운 특징을 가진 용어는 무엇인가?","answer":"① 김치본드","explanation":"김치본드는 국내 발행 주체가 해외에서 외화 자금을 조달하기 위해 발행하는 채권을 의미합니다. [오답해설] ② 양키본드는 외국인이 미국에서 발행하는 달러화 표시 채권입니다. ③ 사무라이본드는 외국인이 일본에서 발행하는 엔화 표시 채권입니다. ④ 불독본드는 외국인이 영국에서 발행하는 파운드화 표시 채권입니다.","news_context":"여신업계가 고금리 상황 속에서 외화조달을 위한 돌파구로 김치본드와 해외ABS 발행을 모색하고 있다는 뉴스입니다.","news_url":"https://www.yna.co.kr/view/AKR20260614046000002","options":["① 김치본드","② 양키본드","③ 사무라이본드","④ 불독본드"]},{"id":1234,"category":"금융용어","question":"금융회사가 고객에게 금융상품의 주요 내용, 투자 위험성 등을 제대로 설명하지 않거나 사실과 다르게 설명하여 고객이 손해를 보거나 잘못된 판단을 하게 되는 행위를 일컫는 용어는 무엇인가?","answer":"① 불완전판매","explanation":"불완전판매는 금융상품 판매 시 투자자에게 상품의 중요 정보를 제대로 설명하지 않거나 오해를 유발하여 손해를 입히는 행위를 말합니다. [오답해설] ② 기망판매는 거짓말이나 속임수로 물건을 파는 행위로, 불완전판매보다 고의성이 더 강합니다. ③ 과당판매는 고객의 재정 상황이나 투자 성향과 무관하게 지나치게 많은 금융상품을 권유하는 행위입니다. ④ 강매는 강압적인 방법으로 물건을 강제로 구매하게 하는 행위입니다.","news_context":"스페이스X 공모주 배정 문제로 투자자들이 불완전판매를 주장하며 금융당국이 미래에셋을 검사한다는 뉴스입니다.","news_url":"https://www.yna.co.kr/view/AKR20260614048300002","options":["① 불완전판매","② 기망판매","③ 과당판매","④ 강매"]},{"id":1235,"category":"세부지식","question":"청년도약계좌에 대한 설명으로 옳지 않은 것은?","answer":"④ 중도 해지 시에도 정부 기여금과 비과세 혜택을 모두 유지할 수 있다.","explanation":"청년도약계좌는 원칙적으로 5년 만기를 채워야 정부 기여금과 비과세 혜택을 받을 수 있으며, 중도 해지 시에는 제한적으로 적용됩니다. [오답해설] ① 청년도약계좌의 가입 연령 조건은 만 19세 이상 34세 이하입니다. ② 청년도약계좌는 가입자의 소득 수준에 따라 정부 기여금을 차등 지원하여 저소득층에게 더 많은 혜택을 줍니다. ③ 청년도약계좌는 월 최대 70만원까지 자유롭게 납입할 수 있으며, 만기 시 비과세 혜택이 주어집니다.","news_context":"청년들을 위한 금융 역량 강화와 자산 형성에 관심이 높아지면서 청년도약계좌와 같은 상품이 언급되고 있습니다.","news_url":"https://www.mk.co.kr/news/economy/12073574","options":["① 만 19세 이상 34세 이하 청년이 가입할 수 있다.","② 가입자의 총급여에 따라 정부 기여금이 차등 지원된다.","③ 월 최대 70만원 납입 시 비과세 혜택이 적용된다.","④ 중도 해지 시에도 정부 기여금과 비과세 혜택을 모두 유지할 수 있다."]},{"id":1236,"category":"세부지식","question":"국민성장펀드에 대한 설명으로 옳은 것은?","answer":"③ 중소·중견기업의 성장을 돕고 고용 창출을 목표로 한다.","explanation":"국민성장펀드는 중소·중견기업의 스케일업을 지원하고 일자리 창출을 유도하는 것을 주요 목표로 합니다. [오답해설] ① 국민성장펀드는 정부와 민간이 공동 출자하여 운영되며, 일반 개인도 간접적으로 투자할 수 있는 기회가 제공됩니다. ② 국민성장펀드는 주로 성장 가능성이 있는 중소·중견기업을 지원하여 국내 경제의 역동성을 높이는 데 기여합니다. ④ 국민성장펀드는 투자형 펀드로 운용되므로, 투자 성과에 따라 원금 손실 위험이 존재할 수 있습니다.","news_context":"국민들에게 큰 인기를 얻었던 국민성장펀드의 2차분이 곧 출시될 예정이며, 6천억 원 규모로 조성될 것이라는 뉴스입니다.","news_url":"https://www.kbmaeil.com/article/20260615500006","options":["① 정부 재원으로만 운영되며, 일반 개인은 투자할 수 없다.","② 주로 대기업의 신사업 투자에만 집중적으로 지원한다.","③ 중소·중견기업의 성장을 돕고 고용 창출을 목표로 한다.","④ 만기 시 원금 손실 위험이 없는 확정금리형 상품이다."]},{"id":1237,"category":"세부지식","question":"국민연금공단이 공공기관 퇴직연금 '기금형' 운용을 추진하는 배경과 효과에 대한 설명으로 옳은 것은?","answer":"② 공공기관 퇴직연금의 운용 효율성을 높이고 수익률을 제고하기 위함이다.","explanation":"국민연금공단의 기금형 운용 추진은 전문적인 운용 능력을 활용하여 공공기관 퇴직연금의 운용 효율성과 장기 수익률을 향상시키기 위한 목적이 큽니다. [오답해설] ① 기금형 운용은 민간 위탁을 대체하거나 보완하는 방식이 될 수 있지만, 전면 위탁을 지향하는 것은 아닙니다. ③ 기금형 운용이 확정기여형(DC)으로의 통일을 직접적으로 강제하는 것은 아니며, 기존 제도의 효율성을 높이는 데 초점이 맞춰져 있습니다. ④ 공공기관 퇴직연금의 기금형 운용은 국민연금 재정과는 별개로 공공기관 임직원의 노후 자산 운용을 전문화하려는 것입니다.","news_context":"국민연금공단이 공공기관 퇴직연금을 '기금형'으로 운용하는 방안을 추진하며, 이는 퇴직연금 시장에 큰 변화를 가져올 수 있다는 뉴스입니다.","news_url":"https://n.news.naver.com/mnews/article/001/0016138226?sid=102","options":["① 공공기관의 퇴직연금 운용을 민간 금융기관에 전면 위탁하기 위함이다.","② 공공기관 퇴직연금의 운용 효율성을 높이고 수익률을 제고하기 위함이다.","③ 기금형 운용 시 모든 공공기관의 퇴직연금 제도를 확정기여형(DC)으로 통일하기 위함이다.","④ 국민연금 재정 건전성 악화를 막기 위해 공공기관 퇴직연금을 편입하는 것이다."]},{"id":1238,"category":"시사","question":"미국 연방공개시장위원회(FOMC)의 금리 인상 결정이 국내 은행 대출 금리에 미치는 영향으로 가장 적절한 설명은 무엇인가?","answer":"② 미국 금리 인상은 국내 자본 유출을 막기 위해 한국은행의 기준금리 인상 압박으로 작용할 가능성이 높다.","explanation":"미국 금리 인상은 국내와 금리 격차를 확대시켜 외국인 자본 유출을 유발할 수 있으므로, 한국은행이 기준금리 인상을 고려할 압박이 커지며 이는 국내 대출 금리 상승으로 이어질 수 있습니다. [오답해설] ① 국내 기준금리는 미국의 통화 정책과 직접적인 연관성이 있으며, 국내 금융시장에 큰 영향을 미칩니다. ③ 미국 금리 인상은 국내 시중은행의 해외 차입 금리 등 자금 조달 비용을 오히려 높여 대출 금리 인상 요인이 됩니다. ④ 미국 금리 인상은 가계 대출뿐만 아니라 기업 대출 금리에도 영향을 미쳐 전반적인 대출 금리 상승 압박을 가합니다.","news_context":"이번 주 FOMC 회의와 케빈 워시 의장의 발언이 연내 금리 인상론에 힘을 실어줄지 주목하고 있다는 뉴스입니다.","news_url":"http://www.opinionnews.co.kr/news/articleView.html?idxno=139988","options":["① 국내 기준금리는 미국 기준금리와 무관하게 결정되어 대출 금리에 영향이 없다.","② 미국 금리 인상은 국내 자본 유출을 막기 위해 한국은행의 기준금리 인상 압박으로 작용할 가능성이 높다.","③ 미국 금리 인상은 국내 시중은행의 자금 조달 비용을 낮춰 대출 금리 인하 요인이 된다.","④ 미국 금리 인상은 국내 기업의 투자 심리를 급격히 위축시켜 가계 대출 금리만 상승한다."]},{"id":1239,"category":"시사","question":"한국은행이 최근 원화 약세에 대응하여 외환시장에 개입하는 주요 목적은 무엇인가?","answer":"③ 환율 변동성이 과도하게 확대되는 것을 완화하여 금융시장 안정성을 확보하기 위함이다.","explanation":"한국은행은 환율의 급격한 변동이 금융시장의 불안정성을 초래하는 것을 방지하고, 경제 주체들의 예측 가능성을 높이기 위해 외환시장에 개입합니다. [오답해설] ① 원화 약세는 이미 수출 기업에 유리한 측면이 있지만, 한국은행의 개입은 특정 기업의 경쟁력 강화보다 시장 안정을 우선합니다. ② 한국은행은 환율 상승을 유도하는 것이 아니라 과도한 상승을 억제하여 시장의 안정화를 목표로 합니다. ④ 한국은행의 외환시장 개입은 주식 시장 과열 방지보다는 외환 시장 자체의 안정을 목표로 합니다.","news_context":"한미 당국자가 미국에서 회동하여 원화 약세 대응 공조 방침을 확인했다는 뉴스입니다.","news_url":"https://www.yna.co.kr/view/AKR20260614043200002","options":["① 수출 기업의 가격 경쟁력 강화를 지원하기 위함이다.","② 국내 시중은행의 외화 유동성을 공급하여 환율 상승을 유도하기 위함이다.","③ 환율 변동성이 과도하게 확대되는 것을 완화하여 금융시장 안정성을 확보하기 위함이다.","④ 외국인 투자자의 국내 증시 이탈을 유도하여 주식 시장 과열을 방지하기 위함이다."]},{"id":1240,"category":"시사","question":"고금리 환경에서 자영업자 대출 부실 심화가 국내 은행 건전성에 미칠 수 있는 영향은 무엇인가?","answer":"② 은행의 연체율과 부실채권(NPL) 비율이 증가하여 대손충당금 적립 부담이 커진다.","explanation":"자영업자 대출 부실은 은행의 대출 건전성을 악화시켜 연체율과 부실채권 비율을 높이고, 이는 은행이 미래 손실에 대비하여 쌓아야 할 대손충당금 규모를 증가시키는 직접적인 원인이 됩니다. [오답해설] ① 자영업자 대출은 국내 은행 대출에서 상당한 비중을 차지하며, 부실 심화는 은행 건전성에 심각한 영향을 미칠 수 있습니다. ③ 대출 부실 증가는 은행의 이자 수익 감소와 대손 비용 증가로 이어져 수익성을 악화시킵니다. ④ 정부 지원은 일정 부분 위험을 완화할 수 있지만, 은행의 대출 손실 위험을 완전히 제거할 수는 없습니다.","news_context":"금리 급등 속에서 자영업자들이 빚을 갚지 못하는 경우가 늘어나 고령층 자영업자 부실에 빨간불이 켜졌다는 뉴스입니다.","news_url":"https://www.yna.co.kr/view/AKR20260613047900002","options":["① 은행의 대출 포트폴리오 다양화로 건전성에는 큰 영향이 없다.","② 은행의 연체율과 부실채권(NPL) 비율이 증가하여 대손충당금 적립 부담이 커진다.","③ 자영업자 대출 비중이 낮아 은행의 수익성 개선에 기여한다.","④ 정부의 재정 지원 확대로 은행의 대출 손실 위험이 완전히 사라진다."]},{"id":1241,"category":"시사","question":"금융당국의 가계대출 총량 규제 강화 정책이 시중은행의 여신 전략에 미치는 주요 영향은 무엇인가?","answer":"② 대출 심사를 강화하고, 고위험 차주에 대한 대출 문턱을 높인다.","explanation":"가계대출 총량 규제는 은행이 총 대출액을 일정 수준으로 관리하도록 강제하므로, 은행들은 대출 자산을 건전하게 유지하기 위해 대출 심사를 강화하고 리스크가 높은 차주에게는 대출을 제한하는 전략을 취하게 됩니다. [오답해설] ① 총량 규제는 대출 총액을 관리하는 것이므로, 가계대출 취급 확대는 제한될 수밖에 없습니다. ③ 금융당국은 가계대출 외 다른 부문의 대출은 정책적으로 장려할 수 있으며, 은행이 특정 부문 대출을 전면 중단하기는 어렵습니다. ④ 규제는 금리 형태보다는 대출 총량과 건전성 관리에 초점을 맞추므로, 변동금리 대출 비중을 의무적으로 늘리는 것과는 직접적인 관련이 적습니다.","news_context":"금융당국의 빚투 규제 강화와 신용대출 조이기로 시중은행의 가계대출 증가세가 둔화될 수 있다는 뉴스입니다.","news_url":"https://www.news2day.co.kr/article/20260614500032","options":["① 가계대출 취급을 확대하고, 비주택 담보대출 비중을 크게 늘린다.","② 대출 심사를 강화하고, 고위험 차주에 대한 대출 문턱을 높인다.","③ 중소기업 및 소상공인 대출을 전면 중단하고 가계대출에 집중한다.","④ 변동금리 대출 비중을 의무적으로 늘려 시장 금리 연동을 강화한다."]}];
var current = 0;
var score = 0;
var answered = false;
var audioCtx = null;

function getTagClass(cat) {
  if (cat === '금융용어') return 'tag-금융용어';
  if (cat === '시사') return 'tag-시사';
  if (cat === '세부지식') return 'tag-세부지식';
  return 'tag-default';
}

function render() {
  if (current >= quizzes.length) { showResult(); return; }
  var q = quizzes[current];
  var pct = (current / quizzes.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = current + '/' + quizzes.length;
  var optHtml = '';
  for (var i = 0; i < q.options.length; i++) {
    optHtml += '<button class="option" onclick="selectOpt(this,' + i + ')">' + q.options[i] + '</button>';
  }
  var expParts = (q.explanation || '').split('[오답해설]');
  var expHtml = expParts.length === 2
    ? expParts[0].trim() + '<br><br><strong>[오답해설]</strong><br>' + expParts[1].trim()
    : (q.explanation || '');
  var newsHtml = '';
  if (q.news_context) {
    newsHtml = '<div class="news-ctx">📰 ' + q.news_context;
    if (q.news_url) newsHtml += ' <a href="' + q.news_url + '" target="_blank" class="news-link">[원문]</a>';
    newsHtml += '</div>';
  }
  document.getElementById('quizArea').innerHTML =
    '<div class="quiz-card">' +
    '<span class="category-tag ' + getTagClass(q.category) + '">' + q.category + '</span>' +
    '<div class="question-text">' + q.question + '</div>' +
    '<div class="options" id="opts">' + optHtml + '</div>' +
    '<div class="explanation" id="exp">' +
    '<div class="exp-label">📖 EXPLANATION</div>' +
    expHtml + newsHtml +
    '</div>' +
    '</div>' +
    '<div class="nav-buttons">' +
    '<button class="btn btn-next" id="nextBtn" onclick="nextQ()">' +
    (current === quizzes.length - 1 ? 'RESULT ▶' : 'NEXT ▶') +
    '</button></div>';
  answered = false;
}

function selectOpt(el, idx) {
  if (answered) return;
  answered = true;
  var q = quizzes[current];
  var opts = document.querySelectorAll('.option');
  var getNum = function(s) { var m = s.match(/[①②③④]/); return m ? m[0] : ''; };
  var selNum = getNum(el.textContent);
  var ansNum = getNum(q.answer);
  var isCorrect = selNum && ansNum && selNum === ansNum;
  for (var i = 0; i < opts.length; i++) {
    opts[i].disabled = true;
    if (getNum(opts[i].textContent) === ansNum) opts[i].classList.add('correct');
    else if (opts[i] === el && !isCorrect) opts[i].classList.add('wrong');
  }
  if (isCorrect) score++;
  var rect = el.getBoundingClientRect();
  spawnCoins(rect.left + rect.width/2, rect.top + rect.height/2, isCorrect);
  showScorePopup(isCorrect);
  playBeep(isCorrect);
  document.getElementById('exp').classList.add('show');
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQ() { current++; render(); }

function showResult() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressLabel').textContent = quizzes.length + '/' + quizzes.length;
  var r = document.getElementById('resultCard');
  r.classList.add('show');
  document.getElementById('resultScore').textContent = score;
}

function spawnCoins(x, y, correct) {
  if (!correct) return;
  var stars = document.getElementById('stars');
  for (var i = 0; i < 5; i++) {
    var coin = document.createElement('div');
    coin.className = 'coin-item';
    coin.style.left = (x - 12 + (Math.random()-0.5)*60) + 'px';
    coin.style.top = (y - 12) + 'px';
    coin.style.animationDelay = (i * 0.06) + 's';
    stars.appendChild(coin);
    setTimeout(function(c){ stars.removeChild(c); }, 800, coin);
  }
}

function showScorePopup(correct) {
  var popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.style.left = '50%';
  popup.style.top = '40%';
  popup.style.color = correct ? 'var(--yellow)' : 'var(--red)';
  popup.textContent = correct ? '+1 !' : 'MISS!';
  document.body.appendChild(popup);
  setTimeout(function(){ document.body.removeChild(popup); }, 800);
}

function playBeep(correct) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'square';
    if (correct) {
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);

      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
    } else {
      osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.setValueAtTime(150, audioCtx.currentTime + 0.15);
    }
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);

  } catch(e) {}
}

document.addEventListener('click', function() {
