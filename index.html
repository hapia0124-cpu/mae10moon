<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매십문 💰</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #5bc8f5;
    --sky-dark: #3aa8d8;
    --pink: #ff6eb4;
    --pink-dark: #d94f96;
    --yellow: #ffd700;
    --yellow-dark: #e6a800;
    --cream: #fff8e7;
    --navy: #1a1a6e;
    --purple: #8b5cf6;
    --green: #22c55e;
    --green-dark: #16a34a;
    --red: #ef4444;
    --white: #ffffff;
    --pixel: 4px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--sky);
    font-family: 'Press Start 2P', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* 배경 구름 */
  .bg {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
  }

  .cloud {
    position: absolute;
    background: white;
    border-radius: 0;
    image-rendering: pixelated;
  }

  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
  }

  .c1 { width: 80px; height: 24px; top: 8%; left: 5%; animation: cloudMove 20s linear infinite; }
  .c1::before { width: 48px; height: 24px; top: -16px; left: 16px; }
  .c2 { width: 96px; height: 24px; top: 15%; left: 60%; animation: cloudMove 25s linear infinite 5s; }
  .c2::before { width: 56px; height: 24px; top: -16px; left: 20px; }
  .c3 { width: 64px; height: 16px; top: 5%; left: 35%; animation: cloudMove 18s linear infinite 10s; }

  @keyframes cloudMove {
    from { transform: translateX(-200px); }
    to { transform: translateX(110vw); }
  }

  /* 바닥 잔디 */
  .ground {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 32px;
    background: #5d8a3c;
    border-top: 8px solid #7ab648;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    padding: 1.5rem 1rem 5rem;
    max-width: 700px;
    margin: 0 auto;
  }

  /* 상단 HUD */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .hud-box {
    background: var(--navy);
    border: 4px solid var(--yellow);
    padding: 0.5rem 0.8rem;
    color: var(--yellow);
    font-size: 0.5rem;
    image-rendering: pixelated;
    box-shadow: 4px 4px 0 #000;
  }

  .score-val { color: var(--white); font-size: 0.6rem; }

  /* 메인 타이틀 카드 */
  .title-card {
    background: var(--cream);
    border: 6px solid var(--navy);
    box-shadow: 8px 8px 0 var(--navy);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    text-align: center;
    position: relative;
  }

  .title-card::before {
    content: '';
    position: absolute;
    top: -6px; left: -6px; right: -6px; bottom: -6px;
    border: 3px solid var(--pink);
    pointer-events: none;
  }

  .title-main {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(3.5rem, 12vw, 5.5rem);
    color: #5bc8f5;
    -webkit-text-stroke: 4px var(--navy);
    text-shadow: 6px 6px 0 var(--navy);
    line-height: 1.2;
    margin-bottom: 0.5rem;
    letter-spacing: 4px;
  }

  .title-sub {
    font-size: 0.45rem;
    color: var(--purple);
    letter-spacing: 1px;
  }

  /* 진행바 */
  .progress-wrap {
    background: var(--navy);
    border: 4px solid #000;
    height: 24px;
    margin-bottom: 1.5rem;
    position: relative;
    box-shadow: 4px 4px 0 #000;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: repeating-linear-gradient(
      90deg,
      var(--yellow) 0px,
      var(--yellow) 16px,
      var(--yellow-dark) 16px,
      var(--yellow-dark) 24px
    );
    transition: width 0.4s steps(10);
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: rgba(255,255,255,0.3);
  }

  .progress-label {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.45rem;
    color: var(--white);
    z-index: 2;
  }

  /* 퀴즈 카드 */
  .quiz-card {
    background: var(--cream);
    border: 6px solid var(--navy);
    box-shadow: 8px 8px 0 var(--navy);
    padding: 1.5rem;
    margin-bottom: 1rem;
    animation: popIn 0.2s steps(4) forwards;
  }

  @keyframes popIn {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .category-tag {
    display: inline-block;
    padding: 0.3rem 0.6rem;
    font-size: 0.4rem;
    margin-bottom: 1rem;
    border: 3px solid;
  }

  .tag-금융용어 { background: var(--yellow); color: var(--navy); border-color: var(--yellow-dark); }
  .tag-시사 { background: var(--green); color: white; border-color: var(--green-dark); }
  .tag-세부지식 { background: var(--purple); color: white; border-color: #6d28d9; }
  .tag-default { background: var(--pink); color: white; border-color: var(--pink-dark); }

  .question-text {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.95rem;
    line-height: 1.8;
    color: var(--navy);
    margin-bottom: 1.5rem;
    font-weight: 700;
  }

  /* 보기 버튼 */
  .options { display: flex; flex-direction: column; gap: 0.8rem; }

  .option {
    background: var(--white);
    border: 4px solid var(--navy);
    box-shadow: 4px 4px 0 var(--navy);
    padding: 0.8rem 1rem;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--navy);
    text-align: left;
    width: 100%;
    transition: transform 0.1s steps(2), box-shadow 0.1s steps(2);
    position: relative;
    line-height: 1.5;
  }

  .option:hover:not(:disabled) {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--navy);
    background: var(--yellow);
  }

  .option:active:not(:disabled) {
    transform: translate(4px, 4px);
    box-shadow: 0 0 0 var(--navy);
  }

  .option.correct {
    background: var(--green) !important;
    color: white !important;
    border-color: var(--green-dark) !important;
    box-shadow: 4px 4px 0 var(--green-dark) !important;
    animation: correctFlash 0.3s steps(2) 2;
  }

  .option.wrong {
    background: var(--red) !important;
    color: white !important;
    border-color: #b91c1c !important;
    box-shadow: 4px 4px 0 #b91c1c !important;
    animation: wrongShake 0.3s steps(3);
  }

  @keyframes correctFlash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  @keyframes wrongShake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
    100% { transform: translateX(0); }
  }

  .option.disabled { cursor: default; }

  /* 해설 박스 */
  .explanation {
    display: none;
    margin-top: 1rem;
    background: var(--navy);
    border: 4px solid var(--yellow);
    padding: 1rem;
    color: var(--yellow);
    font-size: 0.4rem;
    line-height: 2;
    animation: popIn 0.2s steps(4);
  }

  .explanation.show { display: block; }

  .explanation .exp-body {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.82rem;
    color: var(--cream);
    line-height: 1.7;
    margin-top: 0.5rem;
  }

  .explanation .news-ctx {
    margin-top: 0.5rem;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.75rem;
    color: rgba(255,248,231,0.6);
    font-style: italic;
  }

  /* 점수 팝업 */
  .score-popup {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 2rem;
    font-weight: 900;
    animation: scoreAnim 0.8s steps(8) forwards;
    pointer-events: none;
    z-index: 999;
    text-shadow: 4px 4px 0 #000;
  }

  .score-popup.correct-pop { color: var(--yellow); }
  .score-popup.wrong-pop { color: var(--red); }

  @keyframes scoreAnim {
    0% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    80% { opacity: 1; transform: translateX(-50%) translateY(-60px) scale(1.2); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-80px) scale(0.8); }
  }

  /* 네비 버튼 */
  .nav-buttons {
    display: flex;
    gap: 0.8rem;
    margin-top: 1rem;
  }

  .btn {
    padding: 0.8rem 1rem;
    border: 4px solid var(--navy);
    box-shadow: 4px 4px 0 var(--navy);
    font-family: 'Press Start 2P', monospace;
    font-size: 0.45rem;
    cursor: pointer;
    transition: transform 0.1s steps(2), box-shadow 0.1s steps(2);
    flex: 1;
    text-align: center;
  }

  .btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--navy);
  }

  .btn:active {
    transform: translate(4px, 4px);
    box-shadow: 0 0 0 var(--navy);
  }

  .btn-next { background: var(--pink); color: white; display: none; }
  .btn-prev { background: var(--white); color: var(--navy); }

  /* 결과 화면 */
  .result-card {
    background: var(--cream);
    border: 6px solid var(--navy);
    box-shadow: 8px 8px 0 var(--navy);
    padding: 2rem;
    text-align: center;
    display: none;
    animation: popIn 0.3s steps(4);
  }

  .result-card.show { display: block; }

  .result-title {
    font-size: 0.7rem;
    color: var(--navy);
    text-shadow: 2px 2px 0 var(--pink);
    margin-bottom: 1.5rem;
    line-height: 2;
  }

  .result-score {
    font-size: 3rem;
    color: var(--yellow);
    text-shadow: 4px 4px 0 var(--yellow-dark), 8px 8px 0 #000;
    margin-bottom: 0.5rem;
    display: block;
  }

  .result-total { font-size: 0.5rem; color: var(--navy); margin-bottom: 1.5rem; }

  .result-msg {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .coin-row {
    display: flex;
    justify-content: center;
    gap: 0.3rem;
    margin-bottom: 1.5rem;
  }

  .coin {
    width: 24px; height: 24px;
    background: var(--yellow);
    border: 3px solid var(--yellow-dark);
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
  }

  .coin.empty { background: #ddd; border-color: #aaa; }

  /* 로딩 */
  .loading {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--navy);
  }

  .pixel-loader {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 1rem;
  }

  .pixel-dot {
    width: 16px; height: 16px;
    background: var(--navy);
    animation: dotBounce 0.6s steps(4) infinite;
  }

  .pixel-dot:nth-child(2) { animation-delay: 0.15s; }
  .pixel-dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes dotBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .loading-text { font-size: 0.45rem; color: var(--navy); }

  .error-msg {
    text-align: center;
    padding: 3rem;
    font-size: 0.5rem;
    color: var(--red);
    background: var(--cream);
    border: 4px solid var(--red);
    box-shadow: 4px 4px 0 #000;
  }

  /* 코인 장식 */
  .stars {
    position: fixed;
    pointer-events: none;
    z-index: 999;
  }

  .coin-item {
    position: absolute;
    width: 24px;
    height: 24px;
    background: var(--yellow);
    border: 3px solid var(--yellow-dark);
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.5rem;
    color: var(--navy);
    font-family: 'Press Start 2P', monospace;
    animation: coinUp 0.7s steps(8) forwards;
    box-shadow: 2px 2px 0 #000, inset 0 2px 0 rgba(255,255,255,0.4);
  }

  .coin-item::before {
    content: '₩';
    font-size: 0.55rem;
    font-weight: 900;
  }

  @keyframes coinUp {
    0%   { opacity: 1; transform: translateY(0) scaleX(1); }
    25%  { transform: translateY(-30px) scaleX(0.3); }
    50%  { transform: translateY(-55px) scaleX(1); }
    75%  { transform: translateY(-75px) scaleX(0.3); }
    90%  { opacity: 1; transform: translateY(-90px) scaleX(1); }
    100% { opacity: 0; transform: translateY(-110px) scaleX(1); }
  }
</style>
</head>
<body>

<div class="bg">
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
</div>
<div class="ground"></div>

<div class="stars" id="starsContainer"></div>

<div class="wrapper">
  <div class="hud">
    <div class="hud-box">💰 SCORE<br><span class="score-val" id="scoreDisplay">0</span></div>
    <div class="hud-box">📅 TODAY<br><span class="score-val" id="dateDisplay">-</span></div>

  </div>

  <div class="title-card">
    <div class="title-main">매십문</div>
    <div class="title-sub">DAILY FINANCE QUIZ CHALLENGE</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-fill" id="progressBar" style="width:0%"></div>
    <span class="progress-label" id="progressLabel">0/10</span>
  </div>

  <div class="loading" id="loading">
    <div class="pixel-loader">
      <div class="pixel-dot"></div>
      <div class="pixel-dot"></div>
      <div class="pixel-dot"></div>
    </div>
    <div class="loading-text">LOADING...</div>
  </div>

  <div id="quizArea" style="display:none"></div>
  <div class="result-card" id="resultCard"></div>
  <div class="error-msg" id="errorMsg" style="display:none">ERROR: 오늘의 퀴즈를 불러올 수 없습니다.</div>
</div>

<script>
  const SUPABASE_URL = 'https://yhmswitflnujcwpkibso.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlobXN3aXRmbG51amN3cGtpYnNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3OTIwMDksImV4cCI6MjA5NjM2ODAwOX0.K8HGusLahpyKYqn2vkuxjwBFLIu1w_kCSCyZP75MXfc';

  let quizzes = [];
  let current = 0;
  let score = 0;
  let answered = false;

  const today = new Date().toISOString().split('T')[0];
  document.getElementById('dateDisplay').textContent = today.slice(5);

  function getTagClass(cat) {
    const map = { '금융용어': 'tag-금융용어', '시사': 'tag-시사', '세부지식': 'tag-세부지식' };
    return map[cat] || 'tag-default';
  }

  function spawnStars(x, y, correct) {
    if (!correct) return;
    const container = document.getElementById('starsContainer');
    const count = 5;
    for (let i = 0; i < count; i++) {
      const coin = document.createElement('div');
      coin.className = 'coin-item';
      coin.style.left = (x - 12 + (i - 2) * 28) + 'px';
      coin.style.top = (y - 12) + 'px';
      coin.style.animationDelay = (i * 0.06) + 's';
      container.appendChild(coin);
      setTimeout(() => coin.remove(), 1000 + i * 60);
    }
  }

  function showScorePopup(correct) {
    const popup = document.createElement('div');
    popup.className = `score-popup ${correct ? 'correct-pop' : 'wrong-pop'}`;
    popup.textContent = correct ? '+100 !' : 'MISS!';
    document.body.appendChild(popup);
    setTimeout(() => popup.remove(), 900);
  }

  function playBeep(correct) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'square';
      if (correct) {
        osc.frequency.setValueAtTime(523, ctx.currentTime);
        osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
        osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
      } else {
        osc.frequency.setValueAtTime(200, ctx.currentTime);
        osc.frequency.setValueAtTime(150, ctx.currentTime + 0.15);
      }
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    } catch(e) {}
  }

  async function loadQuizzes() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/Quiz?date=eq.${today}&order=id.asc`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      const data = await res.json();
      if (!data || data.length === 0) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('errorMsg').textContent = '오늘의 퀴즈가 아직 준비되지 않았습니다. 잠시 후 다시 오세요!';
        return;
      }
      quizzes = data;
      document.getElementById('loading').style.display = 'none';
      document.getElementById('quizArea').style.display = 'block';
      renderQuiz();
    } catch(e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('errorMsg').style.display = 'block';
    }
  }

  function renderQuiz() {
    if (current >= quizzes.length) { showResult(); return; }
    const q = quizzes[current];
    const options = Array.isArray(q.options) ? q.options : Object.values(q.options);
    answered = false;

    const pct = (current / quizzes.length) * 100;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `${current}/${quizzes.length}`;


    document.getElementById('quizArea').innerHTML = `
      <div class="quiz-card">
        <span class="category-tag ${getTagClass(q.category)}">${q.category}</span>
        <div class="question-text">${q.question}</div>
        <div class="options">
          ${options.map((opt, i) => `
            <button class="option" onclick="selectOption(event, this, \`${opt.replace(/`/g,'\\`')}\`, \`${q.answer.replace(/`/g,'\\`')}\`)">
              ${opt}
            </button>
          `).join('')}
        </div>
        <div class="explanation" id="explanation">
          📖 EXPLANATION
          <div class="exp-body">${q.explanation}</div>
          ${q.news_context ? `<div class="news-ctx">📰 ${q.news_context}</div>` : ''}
        </div>
      </div>
      <div class="nav-buttons">
        <button class="btn btn-prev" onclick="prevQuiz()" ${current === 0 ? 'style="visibility:hidden"' : ''}>◀ BACK</button>
        <button class="btn btn-next" id="nextBtn" onclick="nextQuiz()">
          ${current === quizzes.length - 1 ? 'RESULT ▶' : 'NEXT ▶'}
        </button>
      </div>
    `;
  }

  function selectOption(e, el, selected, answer) {
    if (answered) return;
    answered = true;

    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    const opts = document.querySelectorAll('.option');
    opts.forEach(o => { o.disabled = true; o.classList.add('disabled'); });

    const getNum = str => (str.match(/[①②③④]/) || [''])[0];
    const selNum = getNum(selected);
    const ansNum = getNum(answer);
    const isCorrect = selNum && ansNum && selNum === ansNum;

    if (isCorrect) {
      el.classList.add('correct');
      score += 100;
      document.getElementById('scoreDisplay').textContent = score;
    } else {
      el.classList.add('wrong');
      opts.forEach(o => {
        if (getNum(o.textContent.trim()) === ansNum) o.classList.add('correct');
      });
    }

    spawnStars(cx, cy, isCorrect);
    showScorePopup(isCorrect);
    playBeep(isCorrect);

    document.getElementById('explanation').classList.add('show');
    document.getElementById('nextBtn').style.display = 'block';
  }

  function nextQuiz() { current++; renderQuiz(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  function prevQuiz() { if (current > 0) { current--; renderQuiz(); } }

  function showResult() {
    document.getElementById('quizArea').style.display = 'none';
    document.getElementById('progressBar').style.width = '100%';
    document.getElementById('progressLabel').textContent = `${quizzes.length}/${quizzes.length}`;

    const correct = score / 100;
    const total = quizzes.length;
    const pct = Math.round((correct / total) * 100);

    let msg = '';
    let grade = '';
    if (pct >= 90) { msg = '완벽해요! 금융 전문가! 🏆'; grade = 'S'; }
    else if (pct >= 70) { msg = '대단해요! 거의 다 왔어요! 💪'; grade = 'A'; }
    else if (pct >= 50) { msg = '절반 이상! 계속 도전! 📚'; grade = 'B'; }
    else { msg = '오늘은 어려웠군요. 내일 또 도전! 🌱'; grade = 'C'; }

    const coins = Array.from({length: total}, (_, i) => `<div class="coin ${i < correct ? '' : 'empty'}">💰</div>`).join('');

    const r = document.getElementById('resultCard');
    r.innerHTML = `
      <div class="result-title">GAME CLEAR!</div>
      <span class="result-score">${grade}</span>
      <div class="result-total">${correct} / ${total} 정답 · ${pct}%</div>
      <div class="coin-row">${coins}</div>
      <div class="result-msg">${msg}</div>
      <div style="display:flex;gap:0.8rem">
        <button class="btn btn-next" style="display:block;flex:1" onclick="location.reload()">▶ RETRY</button>
      </div>
    `;
    r.classList.add('show');

    for (let i = 0; i < 20; i++) {
      setTimeout(() => {
        spawnStars(Math.random() * window.innerWidth, Math.random() * window.innerHeight * 0.5, true);
      }, i * 150);
    }
  }

  loadQuizzes();
</script>
</body>
</html>
