<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 금융 뉴스 - 매십문</title>
<meta name="description" content="오늘의 금융 뉴스와 퀴즈 해설. 금융권 취업 준비생을 위한 매일 경제 시사 정리.">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #5bc8f5;
    --pink: #ff6eb4;
    --pink-dark: #d94f96;
    --yellow: #ffd700;
    --yellow-dark: #e6a800;
    --cream: #fff8e7;
    --navy: #1a1a6e;
    --purple: #8b5cf6;
    --green: #22c55e;
    --green-dark: #16a34a;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--sky);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  .ground {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 32px;
    background: #5d8a3c;
    border-top: 8px solid #7ab648;
    z-index: 0;
  }

  .wrapper {
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 1.5rem 5rem;
    position: relative;
    z-index: 1;
  }

  .back-btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--navy);
    background: var(--cream);
    border: 4px solid var(--navy);
    box-shadow: 4px 4px 0 #000;
    padding: 0.6rem 1rem;
    cursor: pointer;
    display: inline-block;
    margin-bottom: 1.5rem;
    text-decoration: none;
  }

  .card {
    background: var(--cream);
    border: 6px solid var(--navy);
    box-shadow: 8px 8px 0 var(--navy);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .title-section {
    text-align: center;
    margin-bottom: 0.5rem;
  }

  .title-main {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 3.5rem;
    color: var(--sky);
    -webkit-text-stroke: 3px var(--navy);
    text-shadow: 4px 4px 0 var(--navy);
    margin-bottom: 0.3rem;
  }

  .date-badge {
    display: inline-block;
    background: var(--navy);
    color: var(--yellow);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    padding: 0.4rem 1rem;
    border: 3px solid var(--yellow);
    margin-bottom: 0.8rem;
    letter-spacing: 1px;
  }

  .subtitle {
    font-size: 0.9rem;
    color: #555;
    line-height: 1.7;
  }

  .section-title {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    color: var(--navy);
    margin-bottom: 1rem;
  }

  .news-item {
    border: 3px solid var(--navy);
    background: var(--white);
    padding: 1rem;
    margin-bottom: 0.8rem;
    box-shadow: 3px 3px 0 var(--navy);
    transition: transform 0.1s steps(2), box-shadow 0.1s steps(2);
  }

  .news-item:hover {
    transform: translate(-2px, -2px);
    box-shadow: 5px 5px 0 var(--navy);
  }

  .news-category {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0.2rem 0.6rem;
    border: 2px solid;
    margin-bottom: 0.5rem;
  }

  .cat-금융용어 { background: var(--yellow); color: var(--navy); border-color: var(--yellow-dark); }
  .cat-시사 { background: var(--green); color: white; border-color: var(--green-dark); }
  .cat-세부지식 { background: var(--purple); color: white; border-color: #6d28d9; }
  .cat-default { background: var(--pink); color: white; border-color: var(--pink-dark); }

  .news-context {
    font-size: 0.85rem;
    color: #333;
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 0.5rem;
  }

  .news-link {
    display: inline-block;
    font-size: 0.8rem;
    color: var(--navy);
    font-weight: 700;
    text-decoration: none;
    border-bottom: 2px solid var(--navy);
    padding-bottom: 1px;
    word-break: break-all;
  }

  .news-link:hover {
    color: var(--pink);
    border-color: var(--pink);
  }

  .news-link::after {
    content: ' →';
  }

  .quiz-btn {
    display: block;
    text-align: center;
    background: var(--pink);
    color: white;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    padding: 1rem;
    border: 4px solid var(--navy);
    box-shadow: 4px 4px 0 var(--navy);
    text-decoration: none;
    margin-top: 1rem;
    transition: transform 0.1s steps(2), box-shadow 0.1s steps(2);
  }

  .quiz-btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--navy);
  }

  .loading-text {
    text-align: center;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--navy);
    padding: 2rem;
  }

  .error-text {
    text-align: center;
    font-size: 0.9rem;
    color: #e04444;
    padding: 2rem;
    font-weight: 700;
  }

  .nav-dates {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-top: 1rem;
  }

  .nav-date-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.4rem;
    color: var(--navy);
    background: var(--cream);
    border: 3px solid var(--navy);
    box-shadow: 3px 3px 0 #000;
    padding: 0.5rem 0.8rem;
    cursor: pointer;
    text-decoration: none;
  }

  .footer-links {
    text-align: center;
    padding: 2rem 0 1rem;
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .footer-links a {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--navy);
    text-decoration: none;
    border-bottom: 2px solid var(--navy);
    padding-bottom: 2px;
  }

  /* 배경 */
  .bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0; }
  .cloud { position: absolute; background: white; image-rendering: pixelated; }
  .cloud::before, .cloud::after { content: ''; position: absolute; background: white; }
  .c1 { width: 48px; height: 16px; top: 12%; left: 5%; animation: cloudMove 18s linear infinite; }
  .c1::before { width: 24px; height: 16px; top: -12px; left: 8px; }
  .c1::after { width: 16px; height: 12px; top: -8px; left: 24px; }
  .c2 { width: 96px; height: 24px; top: 8%; left: 55%; animation: cloudMove 26s linear infinite 4s; }
  .c2::before { width: 48px; height: 24px; top: -18px; left: 16px; }
  .c2::after { width: 32px; height: 16px; top: -10px; left: 52px; }
  .c3 { width: 140px; height: 32px; top: 18%; left: 20%; animation: cloudMove 35s linear infinite 10s; }
  .c3::before { width: 72px; height: 32px; top: -24px; left: 24px; }
  .c3::after { width: 48px; height: 20px; top: -14px; left: 72px; }
  .c4 { width: 32px; height: 12px; top: 5%; left: 40%; animation: cloudMove 14s linear infinite 7s; }
  .c4::before { width: 16px; height: 12px; top: -8px; left: 8px; }
  .c5 { width: 112px; height: 28px; top: 25%; left: 70%; animation: cloudMove 30s linear infinite 2s; }
  .c5::before { width: 56px; height: 28px; top: -20px; left: 20px; }
  .c5::after { width: 40px; height: 18px; top: -12px; left: 60px; }
  .c6 { width: 64px; height: 20px; top: 3%; left: 80%; animation: cloudMove 22s linear infinite 15s; }
  .c6::before { width: 32px; height: 20px; top: -14px; left: 12px; }
  @keyframes cloudMove { from { transform: translateX(-250px); } to { transform: translateX(110vw); } }
  .sun { position: fixed; top: 10%; right: 12%; width: 48px; height: 48px; background: #ffd700; z-index: 0; image-rendering: pixelated; box-shadow: -8px 0 0 #ffd700, 8px 0 0 #ffd700, 0 -8px 0 #ffd700, 0 8px 0 #ffd700, -16px -16px 0 8px #ffd700, 16px -16px 0 8px #ffd700, -16px 16px 0 8px #ffd700, 16px 16px 0 8px #ffd700, 0 0 0 56px rgba(255,220,0,0.15); animation: sunPulse 3s ease-in-out infinite; }
  @keyframes sunPulse {
    0%, 100% { box-shadow: -8px 0 0 #ffd700, 8px 0 0 #ffd700, 0 -8px 0 #ffd700, 0 8px 0 #ffd700, -16px -16px 0 8px #ffd700, 16px -16px 0 8px #ffd700, -16px 16px 0 8px #ffd700, 16px 16px 0 8px #ffd700, 0 0 0 56px rgba(255,220,0,0.15); }
    50% { box-shadow: -8px 0 0 #ffd700, 8px 0 0 #ffd700, 0 -8px 0 #ffd700, 0 8px 0 #ffd700, -16px -16px 0 8px #ffd700, 16px -16px 0 8px #ffd700, -16px 16px 0 8px #ffd700, 16px 16px 0 8px #ffd700, 0 0 0 68px rgba(255,220,0,0.25); }
  }
  .pixel-tree { position: fixed; bottom: 32px; z-index: 0; image-rendering: pixelated; }
</style>
</head>
<body>
<div class="bg">
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="cloud c4"></div>
  <div class="cloud c5"></div>
  <div class="cloud c6"></div>
</div>
<div class="sun"></div>
<svg class="pixel-tree" style="left:1%;width:96px;height:144px" viewBox="0 0 16 24" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">

  <rect x="6" y="2" width="4" height="2" fill="#3aaa3a"/><rect x="4" y="4" width="8" height="2" fill="#2d8a2d"/>
  <rect x="3" y="6" width="10" height="2" fill="#3aaa3a"/><rect x="2" y="8" width="12" height="2" fill="#2d8a2d"/>
  <rect x="4" y="10" width="8" height="2" fill="#3aaa3a"/><rect x="2" y="12" width="12" height="2" fill="#2d8a2d"/>

  <rect x="5" y="0" width="6" height="2" fill="#2d8a2d"/><rect x="4" y="2" width="8" height="2" fill="#3aaa3a"/>
  <rect x="3" y="4" width="10" height="2" fill="#2d8a2d"/><rect x="2" y="6" width="12" height="2" fill="#3aaa3a"/>
  <rect x="3" y="8" width="10" height="2" fill="#2d8a2d"/><rect x="2" y="10" width="12" height="2" fill="#3aaa3a"/>
  <rect x="1" y="12" width="14" height="2" fill="#2d8a2d"/><rect x="6" y="14" width="4" height="8" fill="#5a3720"/>

<div class="ground"></div>
<div class="wrapper">
  <a href="index.html" class="back-btn">◀ 퀴즈로 돌아가기</a>

  <div class="card" style="text-align:center;margin-bottom:1rem">
    <div class="title-main">매십문</div>
    <div style="margin:0.5rem 0">
      <span class="date-badge" id="dateBadge">날짜 로딩중...</span>
    </div>
    <div class="subtitle">오늘의 퀴즈에 쓰인 금융 뉴스 모아보기</div>
  </div>

  <div class="card" id="newsCard">
    <div class="section-title">📰 오늘의 뉴스 & 퀴즈 연결</div>
    <div id="newsList"><div class="loading-text">LOADING...</div></div>
    <a href="index.html" class="quiz-btn">▶ 오늘의 퀴즈 풀기</a>
  </div>

  <div class="footer-links">
    <a href="about.html">서비스 소개</a>
    <a href="privacy.html">개인정보처리방침</a>
    <a href="contact.html">문의하기</a>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://yhmswitflnujcwpkibso.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlobXN3aXRmbG51amN3cGtpYnNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3OTIwMDksImV4cCI6MjA5NjM2ODAwOX0.K8HGusLahpyKYqn2vkuxjwBFLIu1w_kCSCyZP75MXfc';

  const params = new URLSearchParams(window.location.search);
  const today = new Date().toISOString().split('T')[0];
  const date = params.get('date') || today;

  document.getElementById('dateBadge').textContent = date.slice(5).replace('-', '/') + ' 뉴스';
  document.title = `${date} 금융 뉴스 - 매십문`;

  function getCatClass(cat) {
    const map = { '금융용어': 'cat-금융용어', '시사': 'cat-시사', '세부지식': 'cat-세부지식' };
    return map[cat] || 'cat-default';
  }

  async function loadNews() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/Quiz?date=eq.${date}&order=id.asc`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      const data = await res.json();

      if (!data || data.length === 0) {
        document.getElementById('newsList').innerHTML = '<div class="error-text">해당 날짜의 데이터가 없습니다.</div>';
        return;
      }

      const hasNews = data.filter(q => q.news_url);

      if (hasNews.length === 0) {
        document.getElementById('newsList').innerHTML = '<div class="error-text">이 날짜는 뉴스 링크가 없습니다.</div>';
        return;
      }

      document.getElementById('newsList').innerHTML = hasNews.map(q => `
        <div class="news-item">
          <span class="news-category ${getCatClass(q.category)}">${q.category}</span>
          <div class="news-context">📌 ${q.news_context}</div>
          ${q.news_url ? `<a class="news-link" href="${q.news_url}" target="_blank" rel="noopener">기사 원문 보기</a>` : ''}
        </div>
      `).join('');

    } catch(e) {
      document.getElementById('newsList').innerHTML = '<div class="error-text">데이터를 불러올 수 없습니다.</div>';
    }
  }

  loadNews();
</script>
</body>
</html>
