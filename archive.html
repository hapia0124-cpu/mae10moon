<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>퀴즈 아카이브 - 매십문</title>
<meta name="description" content="매십문 날짜별 퀴즈 아카이브. 지난 금융 퀴즈를 다시 풀어보세요.">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #5bc8f5;
    --pink: #ff6eb4;
    --pink-dark: #d94f96;
    --yellow: #ffd700;
    --yellow-dark: #e6a800;
    --cream: #fff8e7;
    --navy: #1a1a6e;
    --purple: #8b5cf6;
    --green: #22c55e;
    --green-dark: #16a34a;
    --white: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--sky); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; overflow-x: hidden; position: relative; }
  .ground { position: fixed; bottom: 0; left: 0; right: 0; height: 32px; background: #5d8a3c; border-top: 8px solid #7ab648; z-index: 0; }
  .wrapper { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 5rem; position: relative; z-index: 1; }
  .back-btn { font-family: 'Noto Sans KR', sans-serif; font-weight: 700; font-size: 0.85rem; color: var(--navy); background: var(--cream); border: 4px solid var(--navy); box-shadow: 4px 4px 0 #000; padding: 0.6rem 1rem; cursor: pointer; display: inline-block; margin-bottom: 1.5rem; text-decoration: none; }
  .title-card { background: var(--cream); border: 6px solid var(--navy); box-shadow: 8px 8px 0 var(--navy); padding: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
  .title-main { font-family: 'Black Han Sans', sans-serif; font-size: clamp(2.5rem, 10vw, 4rem); color: #5bc8f5; -webkit-text-stroke: 3px var(--navy); text-shadow: 4px 4px 0 var(--navy); margin-bottom: 0.3rem; }
  .title-sub { font-family: 'Press Start 2P', monospace; font-size: 0.45rem; color: var(--purple); letter-spacing: 1px; margin-bottom: 0.8rem; }
  .title-desc { font-size: 0.9rem; color: #555; }

  .filter-card { background: var(--cream); border: 6px solid var(--navy); box-shadow: 8px 8px 0 var(--navy); padding: 1.2rem 1.5rem; margin-bottom: 1.5rem; }
  .filter-label { font-weight: 900; font-size: 0.85rem; color: var(--navy); margin-bottom: 0.8rem; }
  .month-tabs { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .month-tab { font-family: 'Noto Sans KR', sans-serif; font-weight: 700; font-size: 0.8rem; padding: 0.4rem 0.9rem; background: var(--white); border: 3px solid var(--navy); box-shadow: 3px 3px 0 var(--navy); cursor: pointer; transition: transform 0.1s steps(2), box-shadow 0.1s steps(2); }
  .month-tab:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--navy); }
  .month-tab.active { background: var(--navy); color: var(--yellow); border-color: var(--yellow); }

  .archive-card { background: var(--cream); border: 6px solid var(--navy); box-shadow: 8px 8px 0 var(--navy); padding: 1.5rem; margin-bottom: 1rem; }
  .section-title { font-weight: 900; font-size: 0.95rem; color: var(--navy); margin-bottom: 1rem; }

  .date-item { display: flex; align-items: center; justify-content: space-between; border: 3px solid var(--navy); background: var(--white); padding: 0.9rem 1rem; margin-bottom: 0.6rem; box-shadow: 3px 3px 0 var(--navy); transition: transform 0.1s steps(2), box-shadow 0.1s steps(2); cursor: pointer; text-decoration: none; }
  .date-item:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--navy); }
  .date-item:last-child { margin-bottom: 0; }
  .date-left { display: flex; align-items: center; gap: 0.8rem; }
  .date-badge { background: var(--navy); color: var(--yellow); font-family: 'Press Start 2P', monospace; font-size: 0.4rem; padding: 0.3rem 0.6rem; border: 2px solid var(--yellow); white-space: nowrap; }
  .date-text { font-weight: 700; font-size: 0.9rem; color: var(--navy); }
  .date-count { font-size: 0.75rem; color: #888; margin-top: 0.2rem; }
  .date-arrow { font-family: 'Press Start 2P', monospace; font-size: 0.5rem; color: var(--pink); }

  .today-badge { background: var(--pink); color: white; font-size: 0.65rem; font-weight: 900; padding: 0.2rem 0.5rem; border: 2px solid var(--pink-dark); margin-left: 0.4rem; }

  .loading-text { text-align: center; font-weight: 700; font-size: 0.9rem; color: var(--navy); padding: 2rem; }
  .error-text { text-align: center; font-size: 0.85rem; color: #e04444; padding: 2rem; font-weight: 700; }
  .empty-text { text-align: center; font-size: 0.85rem; color: #888; padding: 1.5rem; font-weight: 700; }
  .page-btn { font-family: 'Press Start 2P', monospace; font-size: 0.4rem; color: #1a1a6e; background: #fff8e7; border: 3px solid #1a1a6e; box-shadow: 3px 3px 0 #000; padding: 0.5rem 0.8rem; cursor: pointer; transition: transform 0.1s steps(2), box-shadow 0.1s steps(2); }
  .page-btn:hover:not(:disabled) { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 #000; }
  .page-btn:disabled { opacity: 0.35; cursor: default; box-shadow: none; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 1.5rem; }
  .stat-box { background: var(--navy); border: 4px solid var(--yellow); padding: 1rem; text-align: center; box-shadow: 4px 4px 0 #000; }
  .stat-val { font-family: 'Press Start 2P', monospace; font-size: 1rem; color: var(--yellow); display: block; margin-bottom: 0.4rem; }
  .stat-label { font-size: 0.75rem; color: var(--cream); font-weight: 700; }

  .footer-links { text-align: center; padding: 2rem 0 1rem; display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; }
  .footer-links a { font-size: 0.85rem; font-weight: 700; color: var(--navy); text-decoration: none; border-bottom: 2px solid var(--navy); padding-bottom: 2px; }

  .bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0; }
  .cloud { position: absolute; background: white; image-rendering: pixelated; }
  .cloud::before, .cloud::after { content: ''; position: absolute; background: white; }
  .c1 { width: 48px; height: 16px; top: 12%; left: 5%; animation: cloudMove 18s linear infinite; }
  .c1::before { width: 24px; height: 16px; top: -12px; left: 8px; }
  .c1::after { width: 16px; height: 12px; top: -8px; left: 24px; }
  .c2 { width: 96px; height: 24px; top: 8%; left: 55%; animation: cloudMove 26s linear infinite 4s; }
  .c2::before { width: 48px; height: 24px; top: -18px; left: 16px; }
  .c2::after { width: 32px; height: 16px; top: -10px; left: 52px; }
  .c3 { width: 140px; height: 32px; top: 18%; left: 20%; animation: cloudMove 35s linear infinite 10s; }
  .c3::before { width: 72px; height: 32px; top: -24px; left: 24px; }
  .c3::after { width: 48px; height: 20px; top: -14px; left: 72px; }
  .c4 { width: 32px; height: 12px; top: 5%; left: 40%; animation: cloudMove 14s linear infinite 7s; }
  .c4::before { width: 16px; height: 12px; top: -8px; left: 8px; }
  .c5 { width: 112px; height: 28px; top: 25%; left: 70%; animation: cloudMove 30s linear infinite 2s; }
  .c5::before { width: 56px; height: 28px; top: -20px; left: 20px; }
  .c5::after { width: 40px; height: 18px; top: -12px; left: 60px; }
  .c6 { width: 64px; height: 20px; top: 3%; left: 80%; animation: cloudMove 22s linear infinite 15s; }
  .c6::before { width: 32px; height: 20px; top: -14px; left: 12px; }
  @keyframes cloudMove { from { transform: translateX(-250px); } to { transform: translateX(110vw); } }
  .sun { position: fixed; top: 10%; right: 12%; width: 48px; height: 48px; background: #ffd700; z-index: 0; image-rendering: pixelated;
    box-shadow: -8px 0 0 #ffd700, 8px 0 0 #ffd700, 0 -8px 0 #ffd700, 0 8px 0 #ffd700, -16px -16px 0 8px #ffd700, 16px -16px 0 8px #ffd700, -16px 16px 0 8px #ffd700, 16px 16px 0 8px #ffd700, 0 0 0 56px rgba(255,220,0,0.15);
    animation: sunPulse 3s ease-in-out infinite; }
  @keyframes sunPulse {
    0%, 100% { box-shadow: -8px 0 0 #ffd700, 8px 0 0 #ffd700, 0 -8px 0 #ffd700, 0 8px 0 #ffd700, -16px -16px 0 8px #ffd700, 16px -16px 0 8px #ffd700, -16px 16px 0 8px #ffd700, 16px 16px 0 8px #ffd700, 0 0 0 56px rgba(255,220,0,0.15); }
    50% { box-shadow: -8px 0 0 #ffd700, 8px 0 0 #ffd700, 0 -8px 0 #ffd700, 0 8px 0 #ffd700, -16px -16px 0 8px #ffd700, 16px -16px 0 8px #ffd700, -16px 16px 0 8px #ffd700, 16px 16px 0 8px #ffd700, 0 0 0 68px rgba(255,220,0,0.25); }
  }
  .pixel-tree { position: fixed; bottom: 32px; z-index: 0; image-rendering: pixelated; }
</style>
</head>
<body>
<div class="bg">
  <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
  <div class="cloud c4"></div><div class="cloud c5"></div><div class="cloud c6"></div>
</div>
<div class="sun"></div>
<svg class="pixel-tree" style="left:1%;width:96px;height:144px" viewBox="0 0 16 24" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <rect x="6" y="0" width="4" height="2" fill="#2d8a2d"/><rect x="4" y="2" width="8" height="2" fill="#3aaa3a"/>
  <rect x="3" y="4" width="10" height="2" fill="#2d8a2d"/><rect x="2" y="6" width="12" height="2" fill="#3aaa3a"/>
  <rect x="4" y="8" width="8" height="2" fill="#2d8a2d"/><rect x="3" y="10" width="10" height="2" fill="#3aaa3a"/>
  <rect x="2" y="12" width="12" height="2" fill="#2d8a2d"/><rect x="1" y="14" width="14" height="2" fill="#3aaa3a"/>

<svg class="pixel-tree" style="right:2%;width:120px;height:160px" viewBox="0 0 16 24" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <rect x="6" y="0" width="4" height="2" fill="#1a6e1a"/><rect x="4" y="2" width="8" height="2" fill="#2d8a2d"/>
  <rect x="3" y="4" width="10" height="2" fill="#1a6e1a"/><rect x="2" y="6" width="12" height="2" fill="#2d8a2d"/>
  <rect x="5" y="8" width="6" height="2" fill="#1a6e1a"/><rect x="3" y="10" width="10" height="2" fill="#2d8a2d"/>
  <rect x="2" y="12" width="12" height="2" fill="#1a6e1a"/><rect x="1" y="14" width="14" height="2" fill="#2d8a2d"/>
  <rect x="6" y="16" width="4" height="6" fill="#5a3720"/><rect x="10" y="16" width="1" height="6" fill="#7b4f2e"/>
</svg>
<div class="ground"></div>

<div class="wrapper">
  <a href="index.html" class="back-btn">◀ 퀴즈로 돌아가기</a>

  <div class="title-card">
    <div class="title-main">매십문</div>
    <div class="title-sub">DAILY FINANCE QUIZ CHALLENGE</div>
  </div>

  <div class="stats-grid">
    <div class="stat-box">
      <span class="stat-val" id="totalDays">-</span>
      <span class="stat-label">총 퀴즈 일수</span>
    </div>
    <div class="stat-box">
      <span class="stat-val" id="totalQuizzes">-</span>
      <span class="stat-label">총 문제 수</span>
    </div>
  </div>

  <div class="filter-card">
    <div class="filter-label">📅 월별 필터</div>
    <div class="month-tabs" id="monthTabs"></div>
  </div>

  <div class="archive-card">
    <div class="section-title" id="sectionTitle">📋 전체 목록</div>
    <div id="dateList"><div class="loading-text">LOADING...</div></div>
    <div id="pagination"></div>
  </div>

  <div class="footer-links">
    <a href="about.html">서비스 소개</a>
    <a href="privacy.html">개인정보처리방침</a>
    <a href="contact.html">문의하기</a>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://yhmswitflnujcwpkibso.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlobXN3aXRmbG51amN3cGtpYnNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3OTIwMDksImV4cCI6MjA5NjM2ODAwOX0.K8HGusLahpyKYqn2vkuxjwBFLIu1w_kCSCyZP75MXfc';

  const today = new Date().toISOString().split('T')[0];
  let allDates = [];
  let activeMonth = 'all';

  function formatDate(dateStr) {
    const [y, m, d] = dateStr.split('-');
    return `${y}년 ${m}월 ${d}일`;
  }

  function getDayOfWeek(dateStr) {
    const days = ['일', '월', '화', '수', '목', '금', '토'];
    return days[new Date(dateStr).getDay()];
  }

  function renderMonthTabs(dates) {
    const months = [...new Set(dates.map(d => d.date.slice(0, 7)))].sort().reverse();
    const tabs = document.getElementById('monthTabs');
    tabs.innerHTML = `<button class="month-tab active" onclick="filterMonth('all', this)">전체</button>`;
    months.forEach(m => {
      const [y, mo] = m.split('-');
      tabs.innerHTML += `<button class="month-tab" onclick="filterMonth('${m}', this)">${y}.${mo}</button>`;
    });
  }

  const PAGE_SIZE = 5;
  let currentPage = 0;
  let filteredDates = [];

  function filterMonth(month, el) {
    activeMonth = month;
    currentPage = 0;
    document.querySelectorAll('.month-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    filteredDates = month === 'all' ? allDates : allDates.filter(d => d.date.startsWith(month));
    const [y, m] = month === 'all' ? ['', ''] : month.split('-');
    document.getElementById('sectionTitle').textContent = month === 'all' ? '📋 전체 목록' : `📋 ${y}년 ${m}월`;
    renderDateList();
  }

  function renderDateList() {
    const list = document.getElementById('dateList');
    if (!filteredDates.length) {
      list.innerHTML = '<div class="empty-text">해당 월의 퀴즈가 없습니다.</div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }
    const totalPages = Math.ceil(filteredDates.length / PAGE_SIZE);
    const pageItems = filteredDates.slice(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE);

    list.innerHTML = pageItems.map(d => {
      const isToday = d.date === today;
      return `
        <a class="date-item" href="index.html?date=${d.date}">
          <div class="date-left">
            <span class="date-badge">${d.date.slice(5).replace('-', '/')}</span>
            <div>
              <div class="date-text">
                ${formatDate(d.date)} (${getDayOfWeek(d.date)})
                ${isToday ? '<span class="today-badge">TODAY</span>' : ''}
              </div>
              <div class="date-count">문제 ${d.count}개</div>
            </div>
          </div>
          <span class="date-arrow">▶</span>
        </a>
      `;
    }).join('');

    const pagination = document.getElementById('pagination');
    if (totalPages <= 1) { pagination.innerHTML = ''; return; }
    pagination.innerHTML = `
      <div style="display:flex;justify-content:center;align-items:center;gap:0.8rem;margin-top:1rem">
        <button class="page-btn" onclick="changePage(-1)" ${currentPage === 0 ? 'disabled' : ''}>◀ PREV</button>
        <span style="font-family:'Press Start 2P',monospace;font-size:0.4rem;color:#1a1a6e">${currentPage + 1} / ${totalPages}</span>
        <button class="page-btn" onclick="changePage(1)" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>NEXT ▶</button>
      </div>
    `;
  }

  function changePage(dir) {
    const totalPages = Math.ceil(filteredDates.length / PAGE_SIZE);
    currentPage = Math.max(0, Math.min(totalPages - 1, currentPage + dir));
    renderDateList();
    document.querySelector('.archive-card').scrollIntoView({ behavior: 'smooth' });
  }

  async function loadArchive() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/Quiz?select=date&order=date.desc`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      const data = await res.json();
      if (!data || data.length === 0) {
        document.getElementById('dateList').innerHTML = '<div class="error-text">데이터를 불러올 수 없습니다.</div>';
        return;
      }

      const countMap = {};
      data.forEach(row => {
        countMap[row.date] = (countMap[row.date] || 0) + 1;
      });

      allDates = Object.entries(countMap)
        .map(([date, count]) => ({ date, count }))
        .sort((a, b) => b.date.localeCompare(a.date));

      document.getElementById('totalDays').textContent = allDates.length;
      document.getElementById('totalQuizzes').textContent = data.length;

      renderMonthTabs(allDates);
      filteredDates = allDates;
      renderDateList();
    } catch(e) {
      document.getElementById('dateList').innerHTML = '<div class="error-text">데이터를 불러올 수 없습니다.</div>';
    }
  }

  loadArchive();
</script>
</body>
</html>
